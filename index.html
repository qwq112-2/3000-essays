 you could have found it in a Google search. Shouldn't an AI have spotted that? And does it speak to a scarier issue about using technology as a shortcut in war?\nThe principle that we have established — and I think the principle that was obeyed here — is a human makes the final decision. I don't know what role Claude or any other AI had. But if this isn't an illustration of why that principle is so important, I don't know what is.\n\nIs AI warfare more likely to stop World War III — a war between the US and China — or is it more likely to make it happen?\nOn balance, it is more likely to stop it. But if we have no limits on how it's used, then it could be more likely to cause it. You've seen Dr. Strangelove, right? The premise of it was: you have a doomsday device that automatically fires nuclear weapons when it thinks nuclear weapons are being fired at it. What could go wrong?\n\nThe way conflicts happen is that the two sides jump at each other. They misunderstand each other. When we don't have proper oversight of this technology, those kinds of accidents are more likely to happen.\n\nBut if AI is used in an appropriate way — not even warfare, but just intelligence collection — let's say we're able to predict an invasion of Taiwan or a new movement in Ukraine. Our adversaries will think twice about conducting some kind of invasion or military operation if we know everything that they're doing. Superior intelligence really can deter conflict here. Superior ability to respond can deter conflict. I continue to be a believer in these things.\n\nAnthropic's making headlines almost on a weekly basis, and most notably now around Mythos. This is the latest and greatest Anthropic model, and it is capable of going through all the links of the cyber kill chain and doing so autonomously. You said Mythos was too powerful to release to the public. What surprised you most about it?\nThe models had been climbing in their ability to find vulnerabilities and — importantly — turn those vulnerabilities into exploits. People only talk about the vulnerabilities; they don't often talk about turning them into exploits, which it was quite good at. We saw this huge jump. It was a particularly large jump.\n\nAnd without us really prompting them at all, some of the early companies that we gave this to said things like, \"This is a super weapon. You should have to own a gun license to use it. Please don't release this.\" The demand to do this was coming from the companies we gave it to, who were finding so many critical vulnerabilities and exploitability that they were basically asking us not to release it.\n\nNow, to be clear — because things always get distorted in the world of social media — the goal isn't to keep this locked up forever. We're gradually trying to open this up to a wider and wider set of people, and eventually we believe that we should release Mythos to a general audience, but with strong cyber safeguards.\n\nA concern is: today's cyber safeguards — which we did release on Opus 4.7, which is a good cyber model but a substantially weaker one — these can be jailbroken. We're a little concerned about some of the other companies who think this is a sufficient defense. It works sometimes, but we all know that these classifiers can be jailbroken or gone around. Our own testing, as well as our assessment of the defenses that other companies have put in place, suggest that these defenses are not strong enough yet. That's what we're waiting for — getting the defenses to the point where we really have confidence in them.\n\nThere was a lot of pushback on it. You have researchers saying they were able to replicate it using cheaper open source models. Some folks say OpenAI has these capabilities already. What do you say to folks who say this is a grand PR stunt?\nThe claim that it could be replicated with open-source models — that's just incredibly false. The idea is Mythos looks across the whole codebase and finds something. Some guy went on Twitter and said, \"Well, if you point an open source model at exactly the line of code that Mythos finds, then it finds the same issue.\" That isn't the prompt. That isn't the question. That is not the same thing.\n\nThe ultimate test of this is: we go to companies, we go to open source repos. We found 271 new vulnerabilities in Firefox. We've found many thousands within private companies who haven't fixed them yet or can't disclose them yet. No one found those 271 vulnerabilities with the previous models. The actual workflow of what actually works in practice — as opposed to \"I found the exact line that Mythos found, I found the needle in the haystack, something else can now pick up the needle.\"\n\nBut what about the folks who say this was just good marketing?\nWe have suffered enormously commercially from not releasing this model. This model has incredibly accelerated research within Anthropic and production and next models. It would do the same in the outside world if we were to release it. This has hurt us enormously commercially.\n\nIf this helps defenders, it also helps attackers. Can we defend anything anymore?\nThe reason we're giving Mythos to defenders before we give it to attackers is to patch all the bugs. As the models get better, there may be more and more bugs to be found, but there's only so many — they're finite. You have this surface and there's only so many holes in it. You patch all the holes, and then the surface becomes very hard to attack. As well as the code itself being written with the powerful models, it then becomes very hard to find flaws in or break into.\n\nHopefully 6 months or a year from now, we have a much more secure internet ecosystem than we had in the past. We're trying to get to that world, and we're doing the best we can to open up Mythos to new cyber defenders. We've been talking to the government. We're very respectful of their recommendations. They're slowing the pace at which we open it up because they're worried about counterintelligence risk. I think that's sensible.\n\nWe see a lot of sniping from people on Twitter and from other AI companies. You look at what they're saying and the inconsistency with what they're doing. They're not serious people. They're not seriously engaging with the serious tradeoffs that we have here. I have customers calling me up every day saying, \"I want access to Mythos.\" I have countries calling me up saying, \"I want access to Mythos.\" And I have the US government and my security team saying, \"No, wait a minute. There's risk to it.\" Both sides have valid points. But there's a real challenge here, and we need to face it together as a society. Not accuse things of being cheap marketing, not use cheap marketing to try and counter-position. It all shows an incredible lack of gravitas and maturity.\n\nHave you had to make trade-offs already that you're not entirely comfortable with?\nThroughout the entire history of Anthropic, it's been trade-offs. In some ideal world, before you release the first chatbot, you could spend years studying every possible thing that could go wrong with it. We did delay the initial release of Claude, but we did it for a few months. Everything is a trade-off. The extreme ends of the spectrum are completely insane.\n\nNow that we're in what I would describe as a commercially leading position, Daniela and I are actually doing all we can to move the dial even further towards being careful. That's what the Mythos release was about. It's very hard to do something like that if you're not the leading player. I think you're going to see more things like that.\n\nYou know, there's this argument — why wouldn't the government take you over? Why would they let a private company control technology that's so powerful?\nThat's a very serious question, and I share those concerns. I don't think the government should outright take us over. But let me back up and describe the situation. Every previous powerful technology we've seen in history was either built by the government or originated with the government. Nuclear weapons, obviously. But even the internet, GPS, cell phones — all the R&D was done in the federal labs and the universities.\n\nAI is the first technology that's been built in the private sector, where government has not really had a serious role and is coming in late to the game. I think that's actually a dangerous and unstable situation. It is not the situation I would have chosen. There's not really an alternative — this technology is possible to build, our adversaries are building it, it has economic value. It's going to get built. The issue is the government not doing it, not the private sector doing it.\n\nI think we need checks and balances on the power of the AI companies. We have this thing — the Long-Term Benefit Trust. It's a body that can appoint the majority of the board members and remove the majority of the board members. It essentially, if you thread it through, has the power to fire me. We're introducing some elements of public governance — you're accountable to someone who doesn't just have stock in the company. That structure is going to continue no matter what happens to the company. We encourage other companies to have similar structures.\n\nOn the government side, we need checks and balances. There are efforts in Congress that have been announced to enact those red lines. The legislative branch and the judicial branch need to exert themselves. I'm scared of companies having this technology, but I'm also scared of government having it. Companies need to provide checks on government, and government needs to provide checks on companies. We need basic regulation of the technology — pre-release testing, testing and auditing of the models.\n\nIt's very funny to me how there's a particular group of people in Silicon Valley who started with a position of \"even transparency around this technology, even export control — this will apocalyptically destroy our potential to create the technology, it'll kill innovation.\" And then as soon as they see the first real danger, which I've been expecting all along, there's all this talk of nationalization and \"the government should just seize it.\" Come on, folks. You're yo-yoing from the most extreme anti-regulatory to \"this completely communist, the government should grab it all.\" We need a more sensible, moderate approach. That's the one we've been favoring all along, because we've understood the power of this technology. We're not panicking. We're not denying it. We see the smooth exponential, and we're responding to it appropriately.\n\nSo, how was your visit back to the White House?\nWe always try to work together with whoever we can in government. We have this simple approach: we have a set of principles, we follow those principles, and we hope that folks on the other side are reasonable. Honestly, the government has taken Mythos very seriously. We've had good conversations with Secretary Bessent, with Chief of Staff Susie Wiles. I think they really understand the nature of the risks here. Mythos has helped them to feel much more concretely where these risks are. As with any administration, there are parts who we get along with very well and who understand it, and there are other parts that are harder to get along with. I think that's normal. We just try to navigate it as best we can.\n\nYou worked at Baidu earlier in your career — big Chinese tech company. You worked at the Silicon Valley outpost. You've been clear on your views on China. Strong open source models are coming out of China, and you have US companies building on them for free. Is that a threat?\nOne of the things we've seen with this technology is that there's really a premium to how intelligent the models are. We very rarely see that people would prefer to use models with lower intelligence. There's a thriving ecosystem — lots of challenges and problems that are much easier than the ones we need frontier models for. But it's an exponential. These far-from-frontier models may have economic value comparable to what we saw in 2023 and 2024. But we have this 10x a year growth. What's on the frontier is always much, much larger than what is away from the frontier.\n\nThis is something that people who are used to building products in the previous era don't quite understand. As someone who hadn't run a company before, I feel like an outsider to that world. People's instincts are wrong. They have all these kind of product heuristics. The 10x per year model exponential really breaks that. Intelligence is just such a huge factor that it outweighs everything else. We're just seeing over and over again that the value is found on the frontier.\n\nNow, what I do worry about with some of these laggard models is the risks of them. We have Mythos-class cyber capabilities. 12 months from now we'll have much better cyber capabilities, but the Mythos-class cyber capabilities may just be available for anyone to download. Hopefully we'll have patched everything before then. I don't think there's anything we can do to stop it, but it's a serious concern.\n\nDid what you saw at Baidu shape your views on China?\nNot really. I worked there for a year. I probably learned more about speech recognition. Maybe the only thing that concerned me was — part of how we got all the speech recognition data was, they said ominously, \"We don't care about privacy in China, so we have all this speech recognition data.\"\n\nAside from that, my worries here are geopolitical. The things that most worried me about what happened in China are what we saw happen to the Uyghurs, what we saw with suppression of criticism even in the US with what happened with Hong Kong. The fact that the CCP could reach into the US business network and suppress criticism — that's an authoritarian state, and a high-tech authoritarian state. When I see how that combines with AI, you really get a dystopia here — like 1984 or worse.\n\nMy focus is on trying to prevent that. I think we have an opportunity for AI to be a pro-democracy technology — that makes people freer, that delivers on the promise of equal justice for all. Or it could go the other way. Which way it goes depends on the actions of the AI companies, the actions of the government, the actions of all of us. We have responsibility here.\n\nThere's a moment that people in your field talk about where AI gets good enough to improve itself and then the improved version improves itself, and so on. Some of your researchers think that moment is close. How far away is it?\nI don't think it's a moment in time. I think it's a continuous process. We're already seeing it in some ways where the AI is able to suggest architectures for the next AI. A year ago we were seeing 10 to 15% increase in total factor productivity due to AI. That's probably up to 20 or 30% now. It might be doubling. As with all things, we're on the exponential.\n\nThere's no moment where AI improves itself or runs out of control or becomes unsafe. What we have is an accelerating exponential. At each point on the exponential, we have to assess: is this a time to slow down? Is this a time to put more controls on this technology? More and more of that is going to be required.\n\nI think the Rosetta Stone to all of this is the smooth exponential. There's an object lesson in the people who were against all AI regulation and then they saw one thing and they wanted to nationalize. There's an object lesson in the people who dismissed the power of AI and then said, \"Oh my god, it's improving itself. It's running out of control. We have to shut it all down.\" Yo-yoing between those extreme reactions is incredibly unhelpful. The right response, the wise response, is to say: \"We're not going to panic. Our countermeasures will smoothly ratchet up with the power of the technology.\" If you see someone having this kind of crazy yo-yo reaction, that's a sign that they were caught by surprise and that they're not serious.\n\nI understand one of your favorite books is The Making of the Atomic Bomb. Do you see parallels between yourself and Oppenheimer?\nThe figure I most identified with was Leo Szilard, who was the one who first basically had the idea that there could be a kind of chain reaction. We're not going to get through this with larger-than-life personalities or figures who try and be at the center of everything. There needs to be a balance of power here. There's a lot of powerful actors who have interests here, and the only way it's going to end well for everyone is if there are basically checks and balances everywhere. In some ways, I actually see Oppenheimer as a failure case — as what should not happen.\n\nYou've said there's roughly a 10 to 25% chance of civilizational collapse. That is not insignificant. Is there a scenario where it's something that Anthropic built that caused that?\nI certainly hope not. The actions that we have taken lower that probability rather than increasing it. That probability comes from the very straightforward recipe of the technology: the existence of many countries in the world, the existence of many companies within an economy, and new ones created if the void isn't filled. That's a dilemma that we're in. We are trying to act to lower that probability. I think we lower it a lot more than we raise it.\n\nBut the inherent property of this technology is that it's unpredictable. We try to build something and test it a lot before it's released. The models released today are not dangerous — or at least not really dangerous outside of cyber. Then we try and iterate and learn from that. There's like a zillion defense mechanisms. Half of what we do within the company is try and reduce the risk as much as we can. But it's never going to be zero.\n\nSuppose there are a bunch of airline companies out there, and you're like, \"Well, I'm going to make an airline company that's safer.\" It can both be the case that your airline company is 10 times safer than all the other airline companies. But if someone comes and asks, \"Can you guarantee that your airplane will never crash?\" — how could you possibly? But if there was a 25% chance of an airplane crashing, you wouldn't get on that plane.\n\nThat's right. 25% is too high. We're trying to make that probability much, much lower. That is the goal.\n\nYou are building something incredibly powerful and stand to gain enormously from it. Why should we trust you?\nWhen any company starts out — and particularly what we've seen with the behavior of Silicon Valley as an entity over the last couple of years — starting from a position of distrust, if you don't know anything about me or Anthropic, is pretty rational. Silicon Valley has lost a lot of the world's trust and has to re-earn it.\n\nThe message we're trying to send is: we're actually different. And that has to be earned in things that we actually do. We stood up for our values. The thing with Mythos — it's really hampered us commercially not to put this very powerful model out. We put our money where our mouth is on China. We cut off access to models. We didn't have to do that. No one told us to do that. That cost us several hundred million — back when several hundred million was a significant fraction of our revenue. The delay of Claude 2 — we have a long history of it.\n\nWe aren't perfect. We make mistakes. But what I would ask is for people to look at the overall history and say: if you add up that overall history, what is the hypothesis about us that is most consistent with that overall history? People have to decide for themselves. But I think the hypothesis that's consistent is: we are genuinely trying to do the right thing. We're imperfect. Organizations are always dysfunctional. We're always trying to fix them and make them work better. Many footfalls, many things that go wrong. But at basis, we have an honest and earnest picture of how to do the right thing. And we're trying to execute on that picture.\n\nWe will see you on the other side of the exponential.\nHopefully. [laughter]\n\nYou always wanted to be a Hollywood star.\nThat's one surprising thing that I didn't understand about the CEO job — is how often you have to wear makeup. [laughter] That was not on my bingo card.\n\nJust a little powder.", "translation_zh": "【编者按】这是彭博社《The Circuit》主持人Emily Chang对Anthropic CEO达里奥·阿莫迪（Dario Amodei）的69分钟深度专访全文。访谈于2026年6月17日发布于Anthropic旧金山总部。\n\n本次访谈被认为是Dario Amodei迄今最坦诚、信息密度最大的一次公开对话，涉及AI能力跃升、就业冲击、文明崩溃概率、秘密模型Mythos、军事AI应用、与Sam Altman的分歧、为何认同西拉德而非奥本海默等重磅话题。\n\n—— 全文中文要点导航 ——\n\n【指数增长的体感】Amodei用相对论比喻AI发展：就像乘坐宇宙飞船以近光速离开地球，睡一觉地球上已过去两天，再睡三天，再睡四天。\"什么都没发生、什么都没发生，然后轰——一切都疯狂了。\"他不偏执，但保持理性警觉。\n\n【离开OpenAI】\"当你感到无法信任某人，当他们的价值观不是他们说的那样，当你看到不诚实的行为模式——就很难继续共事。何必争论？各奔前程，市场见分晓。\"\n\n【为何押注企业级】\"选一个与价值观冲突的商业模式，要么背叛价值观要么变得无足轻重。企业客户重视信任和长期关系，与我们安全部署AI的目标高度协同。\"\n\n【就业：一半白领岗位可能消失】\"我的担忧程度没有变化。自动化90%的工作后，最终会接近100%——必须为人类找到其他事做。\"三类可能幸存的工作：物理世界、人际关系型、指导AI。他痛斥\"末日营销\"指控为\"懒惰\"。\n\n【Mythos超级武器】内部模型能自主完成网络攻击链。早期测试公司说：\"这是超级武器，你应该要持枪证才能用。求你别发布。\"在Firefox中发现271个新漏洞，前代模型零发现。\"我们因为不发布在商业上遭受了巨大损失。\"\n\n【AI与战争】\"更强的军事能力不会引发战争——它能遏制战争。Claude辅助，但人类做最终决定。\"对于伊朗学校被炸事件：\"战争中发生的这些错误真的可怕。\"\n\n【文明崩溃概率10%-25%】\"25%太高了。我们要把它降到低得多。\"用航空公司比喻：你造了比别人安全10倍的飞机，但没法保证永不坠毁。\n\n【西拉德而非奥本海默】\"我实际上把奥本海默看作失败案例。我们需要的不是伟大人物，而是权力制衡——无处不在的制衡。\"\n\n【写作与思考】\"我还没到让Claude直接代写的地步。写作能帮你与想法搏斗。如果端到端用AI写，首先它写不出我的见解，其次我会失去写作的益处。\"\n\n【为什么要相信你？】\"硅谷已失去世界的信任，必须重新赢回来。我们在中国问题上言出必行，花费数亿美元切断模型访问。纵观整个历史，最一致的假设是：我们真的在努力做正确的事。\""}];
const INTRO = {"title":"About the 3000 words","subtitle":"Longman Communication 3000 — what it is and why it matters","en":"The Longman Communication 3000 is a list of the 3000 most frequent words in both spoken and written English, based on statistical analysis of the 390 million words contained in the Longman Corpus Network — a group of corpuses or databases of authentic English language. The Longman Communication 3000 represents the core of the English language and shows students of English which words are the most important for them to learn and study in order to communicate effectively in both speech and writing.\n\nAnalysis of the Longman Corpus Network shows that these 3000 most frequent words in spoken and written English account for 86% of the language. This means that by knowing this list of words, a learner of English is in a position to understand 86% or more of what he or she reads. Of course, 'knowing' a word involves more than simply being able to recognise it and know a main meaning of it. Many of the most frequent words have a range of different meanings, a variety of different grammatical patterns, and numerous significant collocations. Nonetheless, a basic understanding of the Longman Communication 3000 is a very powerful tool and will help students develop good comprehension and communication skills in English.\n\n— Jeremy Harmer, ELT author\n\nTo ensure that users have access to the appropriate information, the Longman Dictionary of Contemporary English marks all the words in the Longman Communication 3000 in red accompanied by special symbols: W1, W2, and W3 for words that are in the top 1000, 2000 and 3000 most frequent words in written English, and S1, S2 and S3 for the top 1000, 2000 and 3000 most frequent words in spoken English. Longman dictionaries are the only ones to highlight the differences between spoken and written frequency.\n\nThese frequency markers give users access to a wealth of information that can help the selection of the appropriate word or phrase in a variety of situations. Not only are the words and meanings given descriptive labels (for example formal or informal, AmE or BrE, humorous, old-fashioned), but now they have the added information about relative frequency in spoken and written language.","zh":"朗文交际 3000 词（Longman Communication 3000）是一份涵盖英语口语和书面语中最常见的 3000 个词的列表。它基于对「朗文语料库网络」（一个由真实英语语料组成的数据库群）中 3.9 亿词的统计分析得出。朗文交际 3000 词代表了英语的核心，它告诉英语学习者哪些词是最重要的，是他们在口语和书面交流中需要优先学习和掌握的。\n\n对朗文语料库网络的分析显示，这 3000 个最常见的英语口语和书面语词汇覆盖了 86% 的语言使用。这意味着，掌握了这份词汇表，英语学习者就能读懂 86% 以上的英语内容。当然，「掌握」一个词不仅仅是能认出它、知道它的主要意思。许多最常见的词有多个不同的含义、多种语法搭配和大量固定搭配。不过，对朗文交际 3000 词有一个基本的了解，本身就是一个非常强大的工具，能帮助学习者培养良好的英语理解能力和沟通能力。\n\n— Jeremy Harmer（杰里米·哈默），英语教学专家\n\n为了让使用者能获得准确的信息，《朗文当代英语词典》把朗文交际 3000 词表中的所有词都用红色标出，并配以特殊符号：W1、W2、W3 表示该词属于书面英语中最常见的 1000、2000、3000 词；S1、S2、S3 则表示该词属于口语中最常见的 1000、2000、3000 词。朗文词典是唯一区分口语和书面语使用频率的词典。\n\n这些频率标记为使用者提供了丰富的信息，能帮助他们在不同场合选择合适的词或短语。这些词和释义不仅有诸如「正式/非正式」「美式/英式」「幽默/过时」之类的描述性标签，还新增了关于口语和书面语相对使用频率的信息。","frequency_guide":[{"code":"S1","meaning_zh":"口语最常见 1000 词","meaning_en":"top 1000 most frequent in Spoken English"},{"code":"S2","meaning_zh":"口语最常见 2000 词","meaning_en":"top 2000 most frequent in Spoken English"},{"code":"S3","meaning_zh":"口语最常见 3000 词","meaning_en":"top 3000 most frequent in Spoken English"},{"code":"W1","meaning_zh":"书面最常见 1000 词","meaning_en":"top 1000 most frequent in Written English"},{"code":"W2","meaning_zh":"书面最常见 2000 词","meaning_en":"top 2000 most frequent in Written English"},{"code":"W3","meaning_zh":"书面最常见 3000 词","meaning_en":"top 3000 most frequent in Written English"}]};


/* === App === */
const STORE = {
  myWords: 'es_mywords_v2',
  blogs: 'es_blogs_v2',
  settings: 'es_settings_v2',
};
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; }
  catch { return fallback; }
}
function save(key, val) { localStorage.setItem(key, JSON.stringify(val)); }
let state = {
  myWords: load(STORE.myWords, {}),
  blogs: load(STORE.blogs, []),
  settings: load(STORE.settings, { theme: 'light' }),
};

/* Theme */
function applyTheme() {
  document.documentElement.setAttribute('data-theme', state.settings.theme);
  document.getElementById('theme-btn').textContent = state.settings.theme === 'dark' ? '🌙' : '☀';
}
document.getElementById('theme-btn').onclick = () => {
  state.settings.theme = state.settings.theme === 'dark' ? 'light' : 'dark';
  applyTheme(); save(STORE.settings, state.settings);
};

/* Toast */
let toastTimer;
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
}

/* Router */
function navigate(h) { window.location.hash = h || '#/read'; }
function currentHash() { return window.location.hash || '#/read'; }
function setActiveTab() {
  const h = currentHash();
  let tab = h.replace('#/', '').split('/')[0];
  if (h.startsWith('#/story/')) tab = 'read';
  if (h.startsWith('#/article/')) tab = 'read';
  if (h === '#/stories' || h === '#/articles') tab = 'read';
  document.querySelectorAll('.topbar .tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
}
window.addEventListener('hashchange', () => { setActiveTab(); render(); });

/* Renderers */
function render() {
  setActiveTab();
  const h = currentHash();
  if (h === '#/' || h === '' || h === '#/read' || h === '#/stories') return renderRead();
  if (h === '#/guide') return renderGuide();
  if (h.startsWith('#/story/')) return renderStory(h.split('/')[2]);
  if (h.startsWith('#/article/')) return renderArticle(h.split('/')[2]);
  if (h.startsWith('#/dictionary')) return renderDictionary();
  if (h.startsWith('#/review')) return renderReview();
  if (h === '#/settings') return renderSettings();
  renderRead();
}

/* === Stories === */
function renderRead() {
  const main = document.getElementById('main');
  const hash = currentHash();
  const params = new URLSearchParams(hash.includes('?') ? hash.split('?')[1] : '');
  const filter = params.get('type') || 'all';

  // Merge stories + articles with type labels
  const allItems = [
    ...(STORIES || []).map(s => ({ ...s, kind: 'story', type: 'fable' })),
    ...(ARTICLES || []).map(a => ({ ...a, kind: 'article' })),
  ];

  // Get unique types for filter pills
  const types = ['all', ...new Set(allItems.map(x => x.type))];

  const filtered = filter === 'all' ? allItems : allItems.filter(x => x.type === filter);
  const totalWords = filtered.reduce((sum, x) => sum + (x.content.match(/[A-Za-z]+/g) || []).length, 0);

  main.innerHTML = `
    <div class="page-head">
      <div class="page-eyebrow">Read · ${filtered.length} items · ~${Math.round(totalWords/1000)}k words total</div>
      <h1 class="page-title">Read & <em>learn</em></h1>
      <p class="page-sub">Stories, science, dialogues, interviews — all written with the Longman 3000 words.</p>
    </div>
    <div class="filter-row" style="margin-bottom:20px;">
      ${types.map(t => `
        <button class="pill ${filter === t ? 'active' : ''}" onclick="navigate('#/read${t === 'all' ? '' : '?type=' + t}')">${t === 'all' ? 'All' : t.charAt(0).toUpperCase() + t.slice(1)}</button>
      `).join('')}
    </div>
    <div class="story-list">
      ${filtered.map((x, i) => {
        const wordCount = (x.content.match(/[A-Za-z]+/g) || []).length;
        const href = x.kind === 'story' ? '#/story/' + x.id : '#/article/' + x.id;
        return `
        <div class="story-card" onclick="navigate('${href}')">
          <div>
            <div class="num">${String(i + 1).padStart(2, '0')} · <span class="article-type-tag tag-${x.type || 'science'}">${x.type || 'article'}</span></div>
            <h3>${escapeHtml(x.title)}${x.title_zh ? ` <span style="font-size:16px;color:var(--ink-muted);font-weight:300;">${escapeHtml(x.title_zh)}</span>` : ''}</h3>
            <div class="desc">${escapeHtml(x.description || '')}${x.description_zh ? ` · ${escapeHtml(x.description_zh)}` : ''}</div>
            <div class="meta">
              <span>${levelLabel(x.level || 'beginner')}</span>
              <span class="dot">·</span>
              <span>${wordCount} words</span>
              <span class="dot">·</span>
              <span>~${Math.ceil(wordCount / 200)} min</span>
            </div>
          </div>
          <div class="arrow">→</div>
        </div>`;
      }).join('')}
    </div>
  `;
}
function levelLabel(l) { return { beginner: 'Beginner', intermediate: 'Intermediate', advanced: 'Advanced' }[l] || l; }

/* === Guide (About the 3000 words) === */
function renderGuide() {
  const main = document.getElementById('main');
  if (typeof INTRO === 'undefined') {
    main.innerHTML = `<div class="empty"><h3>Guide not loaded</h3></div>`;
    return;
  }
  const intro = INTRO;
  const guide = (intro.frequency_guide || []).map(g =>
    `<tr><td class="fg-code">${g.code}</td><td>${g.meaning_zh}</td><td class="fg-en">${g.meaning_en}</td></tr>`
  ).join('');
  main.innerHTML = `
    <div class="page-head">
      <div class="page-eyebrow">Reference</div>
      <h1 class="page-title">${escapeHtml(intro.title)}</h1>
      <p class="page-sub">${escapeHtml(intro.subtitle || '')}</p>
    </div>

    <div class="lang-tabs">
      <button class="lang-tab active" data-lang="en" onclick="switchLang('en')">English</button>
      <button class="lang-tab" data-lang="zh" onclick="switchLang('zh')">中文</button>
    </div>

    <div class="guide-content" id="guide-en">
      ${(intro.en || '').split('\n\n').map(p => `<p>${escapeHtml(p)}</p>`).join('')}
    </div>

function renderStoryContent(text) {
  return text.split(/\n\s*\n/).map(para => {
    const html = escapeHtml(para).replace(/\b([A-Za-z]+(?:'[A-Za-z]+)?)\b/g, (m, w) => {

  }).join('');
}

function addWord(word) {
  const notes = (document.getElementById('notes-input') || {}).value || '';
  const now = Date.now();
  state.myWords[word] = { word, addedAt: now, notes, status: 'new', level: 0, lastResult: null, lastReviewed: null, nextReview: now };
  save(STORE.myWords, state.myWords);
  toast('Added: ' + word);
  openWordPopup(word);
  document.querySelectorAll(`.word[data-word="${word}"]`).forEach(el => { el.classList.add('added'); el.classList.add('just-added'); setTimeout(() => el.classList.remove('just-added'), 600); });
}

  delete state.myWords[word];

function statusLabel(s) { return { new: 'New', learning: 'Learning', reviewing: 'Reviewing', mastered: 'Mastered' }[s] || s; }
function formatDate(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  const today = new Date(); today.setHours(0,0,0,0);
  const d0 = new Date(d); d0.setHours(0,0,0,0);
  const diff = Math.round((d0 - today) / 86400000);
  if (diff === 0) return 'today';
  if (diff === 1) return 'tomorrow';
  if (diff === -1) return 'yesterday';
  if (diff > 0) return `in ${diff} days`;
  return `${-diff} days overdue`;
}

function generateStory() {
  const myWords = Object.values(state.myWords);
  if (myWords.length < 3) {
    document.getElementById('gen-output').innerHTML = '<p style="color:var(--ink-muted);margin-top:16px;">Add at least 3 words to your library first. Go to Dictionary and click words you want to learn.</p>';
    return;
  }

  // Pick a random template
  const tpl = GEN_TEMPLATES[Math.floor(Math.random() * GEN_TEMPLATES.length)];

  // Map POS to pool of words from user's library
  const posMap = {
    n: ['n'], v: ['v'], adj: ['adj'], adv: ['adv'],
  };
  const getWordsByPos = (pos) => {
    return myWords.filter(w => {
      const info = WORDLIST[w.word];
      if (!info) return false;
      const p = info.p || '';
      if (pos === 'n' && p.startsWith('n')) return true;
      if (pos === 'v' && p.startsWith('v')) return true;
      if (pos === 'adj' && p.startsWith('adj')) return true;
      if (pos === 'adv' && p.startsWith('adv')) return true;
      return false;
    });
  };

  // Build replacements
  const usedWords = new Set();
  const pickWord = (pos, suffix) => {
    let pool = getWordsByPos(pos);
    if (pool.length === 0) pool = myWords; // fallback to any word
    const fresh = pool.filter(w => !usedWords.has(w.word));
    const source = fresh.length > 0 ? fresh : pool;
    const picked = source[Math.floor(Math.random() * source.length)];
    if (picked) usedWords.add(picked.word);
    return picked ? `<span class="gen-highlight" onclick="openWordPopup('${picked.word}')">${picked.word}</span>` : `[${pos}${suffix}]`;
  };

  const names = ['Alex', 'Sam', 'Jordan', 'Taylor', 'Casey', 'Morgan', 'Riley', 'Quinn'];
  const numbers = ['a hundred', 'fifty', 'twenty', 'a thousand', 'three', 'ten', 'many', 'several'];

  let story = tpl.template;
  let nIdx = 0, vIdx = 0, adjIdx = 0, advIdx = 0;

  story = story.replace(/\{name\}/g, () => names[Math.floor(Math.random() * names.length)]);
  story = story.replace(/\{pronoun\}/g, (match, offset) => {
    // Use consistent pronoun based on context
    return Math.random() > 0.5 ? 'he' : 'she';
  });
  story = story.replace(/\{number\}/g, () => numbers[Math.floor(Math.random() * numbers.length)]);
  story = story.replace(/\{n(\d+)\}/g, () => pickWord('n', ++nIdx));
  story = story.replace(/\{v(\d+)\}/g, () => pickWord('v', ++vIdx));
  story = story.replace(/\{adj\}/g, () => pickWord('adj', ++adjIdx));
  story = story.replace(/\{adv\}/g, () => pickWord('adv', ++advIdx));

  const output = document.getElementById('gen-output');
  if (output) {
    output.innerHTML = `
      <div class="gen-story">

/* === Quiz === */
const QUIZ_STORE = 'es_quiz_v1';
let quizState = {
  scope: 'all',    // 'all' | 'top1000' | 'unknown'
  count: 20,       // questions per round
  words: [],       // [{word, info}] pool for this quiz
  current: 0,      // current question index
  answers: [],     // [{word, correct, userAnswer}]
  phase: 'setup',  // 'setup' | 'quiz' | 'result'
};

function loadQuizData() {
  try { return JSON.parse(localStorage.getItem(QUIZ_STORE)) || { known: {}, unknown: {} }; }
  catch { return { known: {}, unknown: {} }; }
}
function saveQuizData(data) { localStorage.setItem(QUIZ_STORE, JSON.stringify(data)); }

function renderQuiz() {
  const main = document.getElementById('main');
  const hash = currentHash();
  const params = new URLSearchParams(hash.includes('?') ? hash.split('?')[1] : '');
  const phase = params.get('phase') || 'setup';

  if (phase === 'setup' || !phase) return renderQuizSetup(main);
  if (phase === 'result') return renderQuizResult(main);
  return renderQuizSetup(main);
}

function renderQuizSetup(main) {
  quizState.phase = 'setup';
  const qd = loadQuizData();
  const unknownCount = Object.keys(qd.unknown).length;

  main.innerHTML = `
    <div class="page-head">
      <div class="page-eyebrow">Self-test</div>
      <h1 class="page-title">Vocabulary <em>Quiz</em></h1>
      <p class="page-sub">Test how many of the 3000 words you really know.</p>
    </div>
    <div class="quiz-setup">
      <h2>Choose your scope</h2>
      <div class="quiz-scope-row" id="quiz-scope-row">
        <button class="quiz-scope-btn active" data-scope="all">All 3000 words</button>
        <button class="quiz-scope-btn" data-scope="top1000">Top 1000 (S1+W1)</button>
        ${unknownCount > 0 ? `<button class="quiz-scope-btn" data-scope="unknown">Review ${unknownCount} unknowns</button>` : ''}
      </div>
      <p style="font-size:13px;color:var(--ink-muted);">How many questions?</p>
      <div class="quiz-count-row" id="quiz-count-row">
        <button class="quiz-count-btn" data-count="10">10</button>
        <button class="quiz-count-btn active" data-count="20">20</button>
        <button class="quiz-count-btn" data-count="50">50</button>
        <button class="quiz-count-btn" data-count="100">100</button>
      </div>
      <button class="btn btn-primary" id="quiz-start-btn" style="font-size:15px;padding:14px 36px;">Start Quiz</button>
      ${unknownCount > 0 ? `<p style="margin-top:20px;font-size:13px;color:var(--ink-muted);">You have <strong style="color:var(--accent);">${unknownCount}</strong> words to review from previous quizzes. <a href="#/quiz?phase=result" style="color:var(--accent);text-decoration:underline;">See last result</a></p>` : ''}
    </div>
  `;

  // Scope selector
  document.querySelectorAll('.quiz-scope-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.quiz-scope-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
  });
  // Count selector
  document.querySelectorAll('.quiz-count-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('.quiz-count-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    };
  });
  // Start button
  document.getElementById('quiz-start-btn').onclick = () => {
    const scope = document.querySelector('.quiz-scope-btn.active')?.dataset?.scope || 'all';
    const count = parseInt(document.querySelector('.quiz-count-btn.active')?.dataset?.count || '20');
    startQuiz(scope, count);
  };
}

function startQuiz(scope, count) {
  const qd = loadQuizData();
  let pool = [];

  if (scope === 'all') {
    pool = Object.entries(WORDLIST).filter(([w, info]) => info.zh);
  } else if (scope === 'top1000') {
    pool = Object.entries(WORDLIST).filter(([w, info]) => info.s === 'S1' || info.w === 'W1');
  } else if (scope === 'unknown') {
    pool = Object.entries(WORDLIST).filter(([w, info]) => qd.unknown[w]);
  }

  if (pool.length === 0) {
    alert('No words to quiz!');
    return;
  }

  // Shuffle and pick
  pool = pool.sort(() => Math.random() - 0.5);
  const selected = pool.slice(0, Math.min(count, pool.length));

  quizState = {
    scope, count: selected.length,
    words: selected.map(([word, info]) => ({ word, info })),
    current: 0, answers: [], phase: 'quiz',
  };

  renderQuizQuestion();
}

function renderQuizQuestion() {
  const main = document.getElementById('main');
  const q = quizState.words[quizState.current];
  if (!q) return renderQuizResult(main);

  // Generate 3 distractors: pick random words with different Chinese meanings
  const allZh = Object.entries(WORDLIST)
    .filter(([w, info]) => w !== q.word && info.zh && info.zh !== q.info.zh)
    .map(([w, info]) => ({ word: w, zh: info.zh }));
  const distractors = allZh.sort(() => Math.random() - 0.5).slice(0, 3);

  // Build choices: 1 correct + 3 distractors, shuffled
  const choices = [
    { zh: q.info.zh, correct: true },
    ...distractors.map(d => ({ zh: d.zh, correct: false })),
  ].sort(() => Math.random() - 0.5);

  const pct = Math.round(quizState.current / quizState.count * 100);

  main.innerHTML = `
    <div class="page-head">
      <div class="page-eyebrow">Question ${quizState.current + 1} of ${quizState.count}</div>
      <div class="quiz-progress"><div class="quiz-progress-bar" style="width:${pct}%"></div></div>
    </div>
    <div class="quiz-card">
      <div class="quiz-word">${escapeHtml(q.word)}</div>
      <div class="quiz-pos">${q.info.p || ''} ${q.info.s ? '· ' + q.info.s : ''} ${q.info.w ? '· ' + q.info.w : ''}</div>
      <div class="quiz-choices" id="quiz-choices">
        ${choices.map((c, i) => `
          <button class="quiz-choice" data-index="${i}" data-correct="${c.correct}">
            ${String.fromCharCode(65 + i)}. ${escapeHtml(c.zh)}
          </button>
        `).join('')}
      </div>
    </div>
  `;

  // Attach choice handlers
  document.querySelectorAll('.quiz-choice').forEach(btn => {
    btn.onclick = () => {
      const correct = btn.dataset.correct === 'true';
      // Disable all buttons
      document.querySelectorAll('.quiz-choice').forEach(b => b.disabled = true);
      // Mark correct answer
      document.querySelectorAll('.quiz-choice').forEach(b => {
        if (b.dataset.correct === 'true') b.classList.add('show-correct');
        else if (b === btn && !correct) b.classList.add('wrong');
      });
      if (correct) btn.classList.add('correct');

      quizState.answers.push({ word: q.word, correct });

      // Next question after delay
      setTimeout(() => {
        quizState.current++;
        if (quizState.current >= quizState.count) {
          finishQuiz();
        } else {
          renderQuizQuestion();
        }
      }, correct ? 600 : 1200);
    };
  });
}

function finishQuiz() {
  const qd = loadQuizData();
  quizState.answers.forEach(a => {
    if (a.correct) {
      qd.known[a.word] = (qd.known[a.word] || 0) + 1;
      delete qd.unknown[a.word];
    } else {
      qd.unknown[a.word] = (qd.unknown[a.word] || 0) + 1;
    }
  });
  saveQuizData(qd);
  navigate('#/quiz?phase=result');
}

function renderQuizResult(main) {
  const qd = loadQuizData();
  const unknownWords = Object.keys(qd.unknown).sort();
  const knownWords = Object.keys(qd.known).sort();
  const correct = quizState.answers.filter(a => a.correct).length;

  main.innerHTML = `
    <div class="page-head">
      <div class="page-eyebrow">Quiz result</div>
      <h1 class="page-title">Your <em>score</em></h1>
    </div>
    <div class="quiz-result">
      <div class="score">${correct}<span style="font-size:24px;color:var(--ink-muted);">/${total}</span></div>
      <div class="score-sub">${pct}% correct &mdash; ${pct >= 80 ? 'Great job!' : pct >= 60 ? 'Good effort!' : 'Keep practicing!'}</div>
      <div class="btn-row" style="justify-content:center;">
        <button class="btn btn-primary" onclick="startQuiz('all',20)">New quiz</button>
        ${unknownWords.length > 0 ? `<button class="btn btn-ghost" onclick="startQuiz('unknown',Math.min(${unknownWords.length},50))">Retry unknowns (${unknownWords.length})</button>` : ''}
        ${unknownWords.length > 0 ? `<button class="btn btn-ghost" id="add-unknowns-btn">Add ${unknownWords.length} unknowns to library</button>` : ''}
      </div>
      ${quizState.answers.length > 0 ? `
        <div style="margin-top:40px;">

            <span>Known: <strong style="color:#2e7d32;">${correct}</strong></span>
            <span>Unknown: <strong style="color:#b54545;">${total - correct}</strong></span>
          </div>
        </div>
      ` : ''}
      ${unknownWords.length > 0 ? `
        <div class="quiz-unknown-list">
          <h3>Words to review (${unknownWords.length})</h3>
          <div>
            ${unknownWords.slice(0, 200).map(w => `

        <div class="quiz-unknown-list" style="text-align:center;">
          <h3>All words known!</h3>
          <p style="color:var(--ink-muted);">You got every question right in this round.</p>
        </div>
      `}
    </div>
  `;

  // Attach "add unknowns to library" handler
  const addBtn = document.getElementById('add-unknowns-btn');
  if (addBtn) {
    addBtn.onclick = () => {
      let added = 0;
      unknownWords.forEach(w => {

          added++;
        }

      toast(`Added ${added} words to your library`);
      addBtn.textContent = 'Added!';
      addBtn.disabled = true;
    };
  }
}

/* === Review === */
function renderReview() {
  const main = document.getElementById('main');
  const all = Object.values(state.myWords);
  const now = Date.now();
  const due = all.filter(w => w.status !== 'new' && w.nextReview <= now);
  const newWords = all.filter(w => w.status === 'new');
  const queue = [...due, ...newWords].sort((a, b) => a.nextReview - b.nextReview);
  if (queue.length === 0) {
    main.innerHTML = `
      <div class="page-head">
        <div class="page-eyebrow">SRS · Spaced repetition</div>
        <h1 class="page-title">All <em>caught up</em></h1>
        <p class="page-sub">No words are due for review right now. Read a story to add new ones.</p>
      </div>
      <div class="review-stage">
        <div style="font-family:var(--serif);font-size:64px;font-style:italic;color:var(--accent);">◌</div>
        <h3 style="font-family:var(--serif);font-size:24px;font-weight:400;margin:16px 0 8px;">Nothing to review</h3>
        <p style="color:var(--ink-muted);">Come back later, or <a href="#/read" style="color:var(--accent);text-decoration:underline;">read something</a> to add new words.</p>
        ${all.length >= 3 ? `<button class="btn btn-primary" onclick="generateStory()" style="margin-top:16px;">Generate a story from your ${all.length} words</button><div id="gen-output"></div>` : ''}
      </div>`;
    return;
  }
  const w = queue[0];
  const info = WORDLIST[w.word];
  const remaining = queue.length;
  main.innerHTML = `
    <div class="page-head">
      <div class="page-eyebrow">SRS · Spaced repetition</div>
      <h1 class="page-title">Today's <em>review</em></h1>
    </div>
    <div class="review-stage">
      <div class="review-counter">${remaining} card${remaining === 1 ? '' : 's'} remaining</div>
      <div class="review-word" id="rev-word">${w.word}</div>
      <div class="review-pos">${info ? info.p : ''}</div>
      <div class="review-meaning" id="rev-meaning" style="visibility:hidden;">${w.notes || (info && info.zh ? info.zh + (info.e ? ' · ' + info.e : '') : (info && info.e ? info.e : '— no note yet —'))}</div>
      <button class="btn btn-ghost" id="show-btn" onclick="showMeaning()">Show meaning</button>
      <div class="review-rates" id="rate-btns" style="display:none;">
        <button class="btn btn-danger" onclick="rate('again')">Again <small>&lt; 1d</small></button>
        <button class="btn btn-ghost" onclick="rate('hard')">Hard <small>2d</small></button>
        <button class="btn btn-primary" onclick="rate('good')">Good <small>4d</small></button>
        <button class="btn" style="background:var(--ink);color:var(--bg);" onclick="rate('easy')">Easy <small>7d</small></button>
      </div>
    </div>
    ${all.length >= 3 ? `
    <div style="margin-top:40px;text-align:center;">
      <p style="color:var(--ink-muted);font-size:13px;margin-bottom:8px;">Want to see your words in context?</p>
      <button class="btn btn-ghost" onclick="generateStory()">Generate a story from your ${all.length} words</button>
      <div id="gen-output"></div>
    </div>` : ''}
  `;
  window._rq = queue;
  window._rw = w;
}
function showMeaning() {
  document.getElementById('rev-meaning').style.visibility = 'visible';
  document.getElementById('show-btn').style.display = 'none';
  document.getElementById('rate-btns').style.display = 'grid';
}
function rate(result) {
  const w = window._rw; if (!w) return;
  const now = Date.now();
  const day = 86400000;
  const intervals = { again: 1, hard: 2, good: 4, easy: 7 };
  w.lastResult = result; w.lastReviewed = now; w.nextReview = now + intervals[result] * day;
  if (result === 'again') { w.status = 'learning'; w.level = 0; }
  else if (result === 'hard') { if (w.status === 'new') w.status = 'learning'; }
  else if (result === 'good') { w.level++; if (w.status === 'new' || w.status === 'learning') w.status = 'reviewing'; }
  else if (result === 'easy') { w.level += 2; if (w.level >= 4) w.status = 'mastered'; else w.status = 'reviewing'; }
  state.myWords[w.word] = w; save(STORE.myWords, state.myWords);
  renderReview();
}

function computeBlogStats(blog) {
  const text = (blog.notes || '') + ' ' + (blog.transcript || '');
  const all = extract3000Words(text);
  const learned = all.filter(w => state.myWords[w]);
  return { total: all.length, learned: learned.length, unlearned: all.length - learned.length, pct: all.length ? Math.round(learned.length / all.length * 100) : 0 };
}
function extract3000Words(text) {
  if (!text) return [];
  const found = new Set();
  const matches = text.toLowerCase().match(/[a-z]+(?:'[a-z]+)?/g) || [];
  matches.forEach(w => { if (WORDLIST[w]) found.add(w); });
  return Array.from(found);
}
function quickAdd(word) {
  if (state.myWords[word]) { toast('Already in library: ' + word); return; }
  const now = Date.now();
  state.myWords[word] = { word, addedAt: now, notes: '', status: 'new', level: 0, lastResult: null, lastReviewed: null, nextReview: now };
  save(STORE.myWords, state.myWords);
  toast('Added: ' + word);
  updateBlogStatsPreview();
}

function deleteBlog() {
  const b = window._eb; if (!b) return;
  if (!confirm('Delete this entry?')) return;
  state.blogs = state.blogs.filter(x => x.id !== b.id);
  save(STORE.blogs, state.blogs);
  toast('Deleted');
  navigate('#/blog');
}

/* === Settings === */
function renderSettings() {
  const main = document.getElementById('main');
  const all = Object.values(state.myWords);
  const dueCount = all.filter(w => w.nextReview <= Date.now() && w.status !== 'new').length;
  const newCount = all.filter(w => w.status === 'new').length;
  const storiesLoaded = (typeof STORIES !== 'undefined' && STORIES.length) || 0;
  const wordsLoaded = (typeof WORDLIST !== 'undefined' && Object.keys(WORDLIST).length) || 0;
  main.innerHTML = `
    <div class="page-head">
      <div class="page-eyebrow">Configuration</div>
      <h1 class="page-title">Settings</h1>
    </div>
    <div class="settings-section">
      <h3>Word library</h3>
      <p class="desc">The 3000 most-frequent English words (Longman Communication 3000) are pre-loaded.</p>
      <div class="info-row"><span class="label">Words available</span><span class="val">${wordsLoaded}</span></div>
    </div>
    <div class="settings-section">
      <h3>Stories</h3>
      <p class="desc">Stories are pre-loaded. You can import more from JSON, or write your own.</p>
      <div class="info-row"><span class="label">Stories available</span><span class="val">${storiesLoaded}</span></div>
      <div class="btn-row" style="margin-top:16px;">
        <div class="file-input">
          <button class="btn btn-ghost">Import stories (JSON)</button>
          <input type="file" accept=".json" onchange="importStories(event)">
        </div>
      </div>
    </div>
    <div class="settings-section">
      <h3>Your study data</h3>
      <p class="desc">All your data is stored locally in this browser. Nothing is uploaded.</p>
      <div class="info-row"><span class="label">Words in library</span><span class="val">${all.length}</span></div>
      <div class="info-row"><span class="label">Due for review</span><span class="val">${dueCount + newCount}</span></div>
      <div class="info-row"><span class="label">Mastered</span><span class="val">${all.filter(w => w.status === 'mastered').length}</span></div>
      <div class="btn-row" style="margin-top:20px;">
        <button class="btn btn-ghost" onclick="exportLibrary()">Export library</button>
        <button class="btn btn-danger" onclick="resetAll()">Reset all data</button>
      </div>
    </div>
    <div class="settings-section">
      <h3>Appearance</h3>
      <p class="desc">Light or dark theme. Persisted in your browser.</p>
      <div class="btn-row">
        <button class="btn ${state.settings.theme === 'light' ? 'btn-primary' : 'btn-ghost'}" onclick="setTheme('light')">☀ Light</button>
        <button class="btn ${state.settings.theme === 'dark' ? 'btn-primary' : 'btn-ghost'}" onclick="setTheme('dark')">☾ Dark</button>
      </div>
    </div>
    <div class="settings-section">
      <h3>About</h3>
      <p class="desc">A quiet place to read 3000 English words and remember them.<br>
        Word list: Longman Communication 3000 (pre-loaded)<br>
        Stories: classic public-domain texts (pre-loaded)<br>
        Spaced repetition: simplified SM-2 (1 / 2 / 4 / 7 day intervals)<br>
        Storage: this browser's localStorage (no server, no tracking)
      </p>
    </div>
  `;
}
function setTheme(t) { state.settings.theme = t; applyTheme(); save(STORE.settings, state.settings); renderSettings(); }
function importStories(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const arr = JSON.parse(ev.target.result);
      if (!Array.isArray(arr)) throw new Error('Expected a JSON array');
      // Append to existing
      const existingIds = new Set(STORIES.map(s => s.id));
      const newStories = arr.filter(s => !existingIds.has(s.id));
      STORIES.push(...newStories);
      // Persist (in production, this would be in state)
      toast(`Imported ${newStories.length} new stories`);
      renderSettings();
    } catch (err) { toast('Error: ' + err.message); }
  };
  reader.readAsText(file, 'utf-8');
}
function exportLibrary() {
  const data = Object.values(state.myWords);
  if (!data.length) { toast('Library is empty'); return; }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'library_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
}
function resetAll() {
  if (!confirm('Erase all your data? This cannot be undone.')) return;
  if (!confirm('Are you sure? Words, reviews, and blog entries will all be deleted.')) return;
  localStorage.removeItem(STORE.myWords);
  localStorage.removeItem(STORE.blogs);
  localStorage.removeItem(STORE.settings);
  state = { myWords: {}, blogs: [], settings: { theme: state.settings.theme } };
  toast('Reset complete');
  renderSettings();
}

/* Utils */
function escapeHtml(s) { return String(s || '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c])); }
function escapeAttr(s) { return escapeHtml(s).replace(/"/g, '&quot;'); }

/* Init */
applyTheme();
render();
</script>

</body>
</html>
