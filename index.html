<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3000 词英语口语</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..700,0..100,0..1&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf7f0;
    --bg-elev: #f3eee2;
    --bg-card: #fffdf7;
    --ink: #26221c;
    --ink-muted: #75695b;
    --ink-dim: #a8a092;
    --accent: #b35a35;
    --accent-soft: #f0dccb;
    --accent-deep: #8a3e1f;
    --line: #e6dfd0;
    --line-soft: #efe9db;
    --highlight: #f9e3a0;
    --highlight-added: #d4ecc5;
    --shadow-sm: 0 1px 2px rgba(60, 40, 20, 0.04);
    --shadow-md: 0 4px 16px rgba(60, 40, 20, 0.06), 0 1px 2px rgba(60, 40, 20, 0.04);
    --shadow-lg: 0 20px 50px rgba(60, 40, 20, 0.12), 0 4px 8px rgba(60, 40, 20, 0.04);
    --serif: 'Fraunces', Georgia, 'Songti SC', 'Source Han Serif SC', serif;
    --sans: 'Manrope', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  }
  [data-theme="dark"] {
    --bg: #1a1714;
    --bg-elev: #25211b;
    --bg-card: #211d17;
    --ink: #ede5d6;
    --ink-muted: #b4a89a;
    --ink-dim: #75695b;
    --accent: #d97a52;
    --accent-soft: #3a261a;
    --accent-deep: #f0a884;
    --line: #3a3328;
    --line-soft: #2f2a22;
    --highlight: #5c4a1e;
    --highlight-added: #2e4a2a;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: var(--sans);
    font-size: 15px;
    line-height: 1.6;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.15 0 0 0 0 0.10 0 0 0 0 0.05 0 0 0 0.025 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    opacity: 0.5;
    mix-blend-mode: multiply;
  }
  [data-theme="dark"] body::before { mix-blend-mode: screen; opacity: 0.3; }
  a { color: inherit; text-decoration: none; }
  button { font: inherit; color: inherit; cursor: pointer; background: none; border: none; }
  input, textarea, select { font: inherit; color: inherit; }
  ::selection { background: var(--accent-soft); color: var(--accent-deep); }

  /* ===== Topbar ===== */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line-soft);
    padding: 18px 32px;
    display: flex; align-items: baseline; gap: 28px;
  }
  .topbar .brand {
    font-family: var(--serif); font-weight: 500;
    font-size: 19px; font-variation-settings: 'opsz' 144, 'SOFT' 30;
    color: var(--ink); letter-spacing: -0.01em;
  }
  .topbar .brand .em { color: var(--accent); font-style: italic; }
  .topbar nav { display: flex; gap: 4px; margin-left: 8px; }
  .topbar .tab {
    font-size: 13px; font-weight: 500;
    padding: 6px 12px; border-radius: 999px;
    color: var(--ink-muted); transition: all 0.2s;
    position: relative;
  }
  .topbar .tab:hover { color: var(--ink); background: var(--bg-elev); }
  .topbar .tab.active { color: var(--accent-deep); background: var(--accent-soft); }
  .topbar .icon-btn {
    margin-left: auto; padding: 6px 10px; border-radius: 999px;
    color: var(--ink-muted); font-size: 16px;
  }
  .topbar .icon-btn:hover { background: var(--bg-elev); color: var(--ink); }

  /* ===== Main ===== */
  main { max-width: 880px; margin: 0 auto; padding: 56px 32px 96px; }
  .page-head { margin-bottom: 40px; }
  .page-eyebrow {
    font-family: var(--sans); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.18em;
    color: var(--accent); margin-bottom: 12px;
  }
  .page-title {
    font-family: var(--serif); font-size: 42px; font-weight: 400;
    font-variation-settings: 'opsz' 144, 'SOFT' 30, 'WONK' 1;
    color: var(--ink); letter-spacing: -0.02em; line-height: 1.05;
  }
  .page-title em { color: var(--accent); font-style: italic; }
  .page-sub {
    font-family: var(--serif); font-size: 18px; font-weight: 300;
    color: var(--ink-muted); margin-top: 12px;
    font-variation-settings: 'opsz' 24;
    font-style: italic; line-height: 1.5;
  }

  /* ===== Buttons ===== */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 10px 18px; border-radius: 999px;
    background: var(--ink); color: var(--bg);
    font-size: 13px; font-weight: 600; letter-spacing: 0.02em;
    transition: transform 0.15s, background 0.2s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-deep); }
  .btn-ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .btn-ghost:hover { background: var(--bg-elev); border-color: var(--ink-dim); }
  .btn-danger { background: transparent; color: #b54545; border: 1px solid #e5c5c5; }
  .btn-danger:hover { background: #f5e5e5; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; }

  /* ===== Story Cards ===== */
  .story-list { display: flex; flex-direction: column; gap: 0; }
  .story-card {
    display: grid; grid-template-columns: 1fr auto;
    gap: 16px; align-items: start;
    padding: 28px 0; border-top: 1px solid var(--line-soft);
    cursor: pointer; transition: padding 0.2s;
  }
  .story-card:last-child { border-bottom: 1px solid var(--line-soft); }
  .story-card:hover { padding-left: 12px; }
  .story-card .num {
    font-family: var(--serif); font-size: 14px;
    color: var(--ink-dim); font-style: italic;
    font-variation-settings: 'opsz' 24;
  }
  .story-card h3 {
    font-family: var(--serif); font-size: 26px; font-weight: 400;
    color: var(--ink); margin: 4px 0 6px;
    font-variation-settings: 'opsz' 72, 'SOFT' 30;
    letter-spacing: -0.01em;
  }
  .story-card .desc {
    font-family: var(--serif); font-size: 15px; color: var(--ink-muted);
    font-style: italic; line-height: 1.5;
    font-variation-settings: 'opsz' 24;
  }
  .story-card .meta {
    display: flex; gap: 14px; margin-top: 10px; font-size: 12px; color: var(--ink-dim);
    text-transform: uppercase; letter-spacing: 0.08em; font-weight: 500;
  }
  .story-card .meta .dot { color: var(--line); }
  .story-card .arrow {
    color: var(--ink-dim); font-size: 22px; line-height: 1; margin-top: 8px;
    transition: transform 0.2s, color 0.2s;
  }
  .story-card:hover .arrow { color: var(--accent); transform: translateX(4px); }

  /* ===== Empty State ===== */
  .empty {
    text-align: center; padding: 80px 32px;
    border: 1px dashed var(--line); border-radius: 4px;
    background: var(--bg-card);
  }
  .empty .mark { font-family: var(--serif); font-size: 56px; color: var(--ink-dim); font-style: italic; line-height: 1; margin-bottom: 16px; }
  .empty h3 { font-family: var(--serif); font-size: 24px; font-weight: 400; color: var(--ink); margin-bottom: 8px; }
  .empty p { color: var(--ink-muted); font-size: 14px; max-width: 380px; margin: 0 auto 24px; }

  /* ===== Story Reader ===== */
  .reader-back {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 13px; color: var(--ink-muted);
    margin-bottom: 24px; transition: color 0.2s;
  }
  .reader-back:hover { color: var(--accent); }
  .reader-header { margin-bottom: 32px; }
  .reader-title {
    font-family: var(--serif); font-size: 44px; font-weight: 400;
    color: var(--ink); letter-spacing: -0.02em; line-height: 1.05;
    font-variation-settings: 'opsz' 144, 'SOFT' 50;
  }
  .reader-title-zh {
    font-family: 'Source Han Serif SC', 'Songti SC', 'Noto Serif CJK SC', var(--serif);
    font-size: 22px; font-weight: 350; color: var(--ink-muted);
    margin-top: 8px; letter-spacing: 0.02em;
  }
  .reader-meta {
    display: flex; gap: 14px; align-items: center;
    margin-top: 16px; font-size: 12px; color: var(--ink-muted);
    text-transform: uppercase; letter-spacing: 0.1em; font-weight: 500;
  }
  .reader-meta .dot { color: var(--line); }
  .reader-progress {
    height: 2px; background: var(--line-soft); border-radius: 1px;
    margin: 32px 0; overflow: hidden;
  }
  .reader-progress-bar {
    height: 100%; background: var(--accent);
    transition: width 0.3s;
  }
  .story-body {
    font-family: var(--serif);
    font-size: 21px; font-weight: 350;
    line-height: 1.75; color: var(--ink);
    font-variation-settings: 'opsz' 24;
    letter-spacing: -0.005em;
  }
  .story-body p { margin-bottom: 1.2em; }
  .story-body p:first-of-type::first-letter {
    font-family: var(--serif);
    font-size: 72px; font-weight: 400; float: left; line-height: 0.9;
    margin: 8px 12px 0 0; color: var(--accent);
    font-variation-settings: 'opsz' 144, 'SOFT' 100, 'WONK' 1;
  }
  .story-body .word {
    cursor: pointer; padding: 0 2px; margin: 0 -2px;
    border-radius: 2px; transition: all 0.15s;
    position: relative;
  }
  .story-body .word:hover { background: var(--accent-soft); color: var(--accent-deep); }
  .story-body .word.added { background: var(--highlight-added); }
  .story-body .word.in-list { color: var(--ink-muted); }
  .story-body .word.just-added { animation: pulse 0.5s; }
  @keyframes pulse {
    0% { background: var(--accent); }
    100% { background: var(--highlight-added); }
  }

  /* ===== Word Popup ===== */
  .modal-back {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(40, 30, 20, 0.35);
    backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal-back.show { display: flex; }
  .modal {
    background: var(--bg-card); border: 1px solid var(--line);
    border-radius: 8px; padding: 32px 36px;
    min-width: 360px; max-width: 480px; width: 100%;
    box-shadow: var(--shadow-lg);
  }
  .modal .word {
    font-family: var(--serif); font-size: 38px; font-weight: 400;
    color: var(--ink); letter-spacing: -0.01em;
    font-variation-settings: 'opsz' 144, 'SOFT' 50;
  }
  .modal .pos {
    font-size: 12px; color: var(--ink-muted);
    font-style: italic; margin-top: 2px; margin-bottom: 14px;
  }
  .modal .freq {
    display: flex; gap: 6px; margin-bottom: 18px;
  }
  .modal .freq .pill {
    font-size: 11px; padding: 3px 10px; border-radius: 999px;
    background: var(--bg-elev); color: var(--ink-muted);
    font-weight: 500; letter-spacing: 0.04em;
  }
  .modal .freq .pill strong { color: var(--ink); margin-left: 2px; }
  .modal .dict-row { margin: 14px 0 4px; padding: 12px 14px; background: var(--bg-elev); border-radius: 6px; border-left: 2px solid var(--accent); }
  .modal .dict-label { font-size: 10px; color: var(--accent); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; margin-bottom: 4px; }
  .modal .dict-content { font-size: 15px; line-height: 1.55; }
  .modal .dict-zh { font-family: 'Source Han Serif SC', 'Songti SC', 'Noto Serif CJK SC', serif; color: var(--ink); }
  .modal .dict-en { font-family: var(--serif); color: var(--ink-muted); font-style: italic; font-variation-settings: 'opsz' 24; }
  .modal .notes-input {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--line); border-radius: 6px;
    background: var(--bg); color: var(--ink);
    font-size: 14px; font-family: var(--sans);
    margin-bottom: 18px;
  }
  .modal .notes-input:focus { outline: none; border-color: var(--accent); }
  .modal .notes-label { font-size: 11px; color: var(--ink-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }
  .modal .actions { display: flex; gap: 8px; justify-content: space-between; align-items: center; }
  .modal .actions .left { display: flex; gap: 8px; }
  .modal .status {
    font-size: 12px; color: var(--ink-muted); margin-top: 16px;
    padding-top: 16px; border-top: 1px solid var(--line-soft);
    display: flex; justify-content: space-between;
  }
  .modal .status .ok { color: #2e7d32; }

  /* ===== Words Library ===== */
  .stats-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 0;
    border-top: 1px solid var(--line); border-bottom: 1px solid var(--line);
    margin-bottom: 32px;
  }
  .stat-cell {
    padding: 24px 16px; text-align: center;
    border-right: 1px solid var(--line-soft);
  }
  .stat-cell:last-child { border-right: none; }
  .stat-cell .num {
    font-family: var(--serif); font-size: 36px; font-weight: 400;
    color: var(--ink); font-variation-settings: 'opsz' 144;
    letter-spacing: -0.02em;
  }
  .stat-cell .num.accent { color: var(--accent); font-style: italic; }
  .stat-cell .label {
    font-size: 11px; color: var(--ink-muted); margin-top: 6px;
    text-transform: uppercase; letter-spacing: 0.12em; font-weight: 600;
  }
  .filter-row {
    display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap;
  }
  .filter-row .pill {
    padding: 6px 14px; border-radius: 999px;
    font-size: 13px; color: var(--ink-muted);
    background: transparent; border: 1px solid var(--line);
    cursor: pointer; transition: all 0.15s;
  }
  .filter-row .pill:hover { color: var(--ink); }
  .filter-row .pill.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .word-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 0; border-top: 1px solid var(--line-soft);
  }
  .word-tile {
    padding: 16px 18px; cursor: pointer;
    border-bottom: 1px solid var(--line-soft);
    border-right: 1px solid var(--line-soft);
    transition: background 0.15s;
  }
  .word-tile:hover { background: var(--bg-card); }
  .word-tile .w {
    font-family: var(--serif); font-size: 19px; font-weight: 500;
    color: var(--ink); letter-spacing: -0.01em;
  }
  .word-tile .p { font-size: 10px; color: var(--ink-dim); font-style: italic; margin-left: 6px; }
  .word-tile .n { font-size: 12px; color: var(--ink-muted); margin-top: 4px; min-height: 16px; }
  .word-tile .s {
    display: inline-block; margin-top: 8px;
    font-size: 10px; padding: 2px 8px; border-radius: 999px;
    font-weight: 600; letter-spacing: 0.04em;
  }
  .s-new { background: #e6efe6; color: #2e6a35; }
  .s-learning { background: #f5e6cc; color: #8a5a1f; }
  .s-reviewing { background: #ece4f0; color: #6a3a85; }
  .s-mastered { background: #d4ecc5; color: #1f5d2a; }
  [data-theme="dark"] .s-new { background: #1d2e1f; color: #81c784; }
  [data-theme="dark"] .s-learning { background: #3a2517; color: #ffb74d; }
  [data-theme="dark"] .s-reviewing { background: #2a1b30; color: #ce93d8; }
  [data-theme="dark"] .s-mastered { background: #1b2e1d; color: #a5d6a7; }

  /* ===== Dictionary ===== */
  .dict-search {
    width: 100%; padding: 14px 20px;
    border: 1px solid var(--line); border-radius: 8px;
    background: var(--bg-card); color: var(--ink);
    font-size: 16px; font-family: var(--sans);
    margin-bottom: 16px; position: sticky; top: 72px; z-index: 10;
  }
  .dict-search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .dict-search::placeholder { color: var(--ink-dim); }
  .dict-count { font-size: 13px; color: var(--ink-muted); margin-bottom: 16px; }
  .dict-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 1px;
    background: var(--line-soft);
    border: 1px solid var(--line-soft);
    border-radius: 4px;
    overflow: hidden;
  }
  .dict-card {
    background: var(--bg);
    padding: 10px 12px;
    cursor: pointer;
    transition: background 0.12s;
    display: flex; flex-direction: column; gap: 4px;
    position: relative;
  }
  .dict-card-num {
    position: absolute; top: 4px; right: 6px;
    font-size: 9px; color: var(--ink-dim); font-weight: 500;
    font-family: var(--sans);
  }
  .dict-card:hover { background: var(--bg-card); }
  .dict-card-top { display: flex; align-items: baseline; gap: 4px; flex-wrap: wrap; }
  .dict-card-word {
    font-family: var(--serif); font-size: 14px; font-weight: 550;
    color: var(--ink); font-variation-settings: 'opsz' 72;
    line-height: 1.2;
  }
  .dict-card-pos { font-size: 10px; color: var(--ink-dim); font-style: italic; }
  .dict-card-zh {
    font-family: 'Source Han Serif SC', 'Songti SC', 'Noto Serif CJK SC', serif;
    font-size: 13px; color: var(--ink); line-height: 1.3;
  }
  .dict-card-en {
    font-family: var(--serif); font-size: 11px; color: var(--ink-muted);
    font-style: italic; line-height: 1.3;
    font-variation-settings: 'opsz' 24;
  }
  .dict-card-freq { display: flex; gap: 3px; margin-top: 1px; }
  .dict-card-freq .pill {
    font-size: 8px; padding: 1px 6px; border-radius: 999px;
    background: var(--bg-elev); color: var(--ink-muted);
    font-weight: 600; letter-spacing: 0.04em;
  }
  @media (max-width: 720px) {
    .dict-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); }
    .dict-card { padding: 10px 12px; }
    .dict-card-word { font-size: 14px; }
    .dict-card-zh { font-size: 13px; }
    .dict-card-en { font-size: 12px; }
  }

  /* ===== Articles ===== */
  .article-type-tag {
    display: inline-block; padding: 4px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  }
  .tag-science { background: #dbe8fb; color: #2a5699; }
  .tag-dialogue { background: #f5e0f0; color: #7a3a6a; }
  .tag-technology { background: #d4e8e0; color: #1f5d4a; }
  .tag-health { background: #fce0d8; color: #9a3a2a; }
  .tag-lifestyle { background: #f9e8c8; color: #8a5a1f; }
  .tag-career { background: #e0ddf5; color: #4a3a7a; }
  [data-theme="dark"] .tag-science { background: #1d2e44; color: #7ab0f0; }
  [data-theme="dark"] .tag-dialogue { background: #301d2a; color: #d090c0; }
  [data-theme="dark"] .tag-technology { background: #1a2e26; color: #80c0a8; }
  [data-theme="dark"] .tag-health { background: #381d18; color: #e09080; }
  [data-theme="dark"] .tag-lifestyle { background: #382a18; color: #e0b870; }
  [data-theme="dark"] .tag-career { background: #221d38; color: #a090d0; }

  /* ===== Generate ===== */
  .gen-card {
    max-width: 560px; margin: 0 auto; padding: 36px;
    background: var(--bg-card); border: 1px solid var(--line); border-radius: 12px;
  }
  .gen-card h3 { font-family: var(--serif); font-size: 20px; font-weight: 400; margin-bottom: 16px; }
  .gen-card p { color: var(--ink-muted); margin-bottom: 20px; font-size: 14px; }
  .gen-story {
    background: var(--bg); border: 1px solid var(--line-soft); border-radius: 8px;
    padding: 24px; margin-top: 24px;
    font-family: var(--serif); font-size: 17px; line-height: 1.8;
    color: var(--ink); font-variation-settings: 'opsz' 24;
  }
  .gen-story .gen-highlight {
    background: var(--highlight); padding: 2px 4px; border-radius: 3px;
    font-weight: 500; cursor: pointer;
  }
  .gen-story .gen-highlight:hover { background: var(--accent-soft); }

  /* ===== Quiz ===== */
  .quiz-setup { text-align: center; padding: 60px 32px; }
  .quiz-setup h2 { font-family: var(--serif); font-size: 32px; font-weight: 400; margin-bottom: 12px; font-variation-settings: 'opsz' 144; }
  .quiz-setup p { color: var(--ink-muted); margin-bottom: 32px; }
  .quiz-scope-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }

    "description_zh": "关于诚实的教训。",
    "content": "There was once a young boy who looked after sheep on a hill near a village. He was very bored. 'I wish something exciting would happen,' he thought. Then he had an idea. He ran down the hill and shouted, 'Wolf! Wolf! A wolf is attacking the sheep!' The villagers heard the cry and ran up the hill to help. But when they arrived, there was no wolf. The boy laughed. 'I was only joking,' he said. The villagers were angry, but they went back to their work. A few days later, the boy played the same trick. 'Wolf! Wolf!' he cried. Again the villagers ran up the hill. Again there was no wolf. They warned him, 'Do not lie to us again.' But the boy did not listen. Then one day, a real wolf came. The boy ran down the hill, shouting loudly, 'Wolf! Wolf! Please help!' But this time the villagers thought he was lying again. Nobody came. The wolf destroyed the whole flock. The moral is: a liar is not believed even when he tells the truth.",
    "translation_zh": "从前有个小男孩，在村子附近的小山上放羊。他感到很无聊。'真希望发生点刺激的事，'他想。于是他想到了一个主意。他跑下山，大喊道：'狼来了！狼来了！狼在吃羊！'村民们听到喊声，跑上山来帮忙。但当他们到达时，根本没有狼。男孩大笑起来。'我只是开玩笑而已，'他说。村民们很生气，但还是回去干活了。几天后，男孩又玩了同样的把戏。'狼来了！狼来了！'他喊道。村民们再次跑上山，还是没有狼。他们警告他：'别再对我们撒谎了。'但男孩没有听进去。后来有一天，真的来了一只狼。男孩跑下山，大声喊道：'狼来了！狼来了！快来帮忙！'但这一次，村民们以为他又在撒谎。没有人来。狼毁掉了整群羊。这个寓言的寓意是：撒谎的人即使说真话也没人相信。"
  },
  {
    "id": 4,
    "title": "The Ant and the Grasshopper",
    "title_zh": "蚂蚁与蚱蜢",
    "level": "beginner",
    "description": "Work today, rest tomorrow.",
    "description_zh": "今天努力工作，明天安心休息。",
    "content": "In a field, an ant was working hard all summer. She carried food to her home every day. A grasshopper sat nearby and watched her. 'Why do you work so hard?' he asked. 'Come and sing with me. The sun is warm and the day is beautiful.' 'I am saving food for the winter,' said the ant. 'When winter comes, there will be no food to find.' But the grasshopper only laughed. 'Winter is far away. Why worry about it now?' He went on singing. When winter came, the snow covered everything. The grasshopper had no food and was very hungry. He went to the ant's house and asked for help. 'Please give me something to eat.' The ant looked at him. 'I worked all summer while you sang,' she said. 'Now you must dance.' The moral is: we should prepare for the future, and not waste our time on pleasure alone.",
    "translation_zh": "在一片田野里，一只蚂蚁整个夏天都在辛勤工作。她每天把食物搬回家。一只蚱蜢坐在旁边看着她。'你为什么工作这么辛苦？'他问道，'来和我一起唱歌吧。阳光温暖，天气美好。'我在为冬天储存食物，'蚂蚁说，'冬天来了，就找不到食物了。'但蚱蜢只是笑了笑。'冬天还远着呢。现在担心什么？'他继续唱着歌。冬天来了，大雪覆盖了一切。蚱蜢没有食物，饿极了。他来到蚂蚁的家，请求帮助。'请给我一点吃的吧。'蚂蚁看着他。'我整个夏天都在工作，而你却在唱歌，'她说，'现在你只能跳舞了。'这个寓言的寓意是：我们应该为未来做好准备，不能只贪图眼前的享乐。"
  },
  {
    "id": 5,
    "title": "The North Wind and the Sun",
    "title_zh": "北风与太阳",
    "level": "beginner",
    "description": "Gentleness wins over force.",
    "description_zh": "温和胜过暴力。",
    "content": "One day, the North Wind and the Sun had a quarrel. 'I am stronger than you,' said the North Wind. 'No, I am stronger,' said the Sun. They decided to have a contest. Whoever could make a traveler take off his coat would be the winner. The North Wind went first. He blew and blew with all his might. But the harder he blew, the tighter the traveler held his coat. The cold wind made him pull it close to his body. At last, the North Wind gave up. Then the Sun began to shine. He shone warmly on the traveler. Soon the traveler felt warm. He took off his coat because the day was pleasant. The Sun was the winner. The moral is: gentleness and kindness are stronger than force and anger.",
    "translation_zh": "有一天，北风和太阳争吵起来。'我比你强，'北风说。'不，我更强，'太阳说。他们决定比试一下——谁能让一个旅人脱下外套，谁就是赢家。北风先来。他用尽全力使劲吹。但他吹得越猛，旅人就把外套裹得越紧。寒风让他把外套紧紧地裹在身上。最后，北风放弃了。接着，太阳开始照耀。他暖暖地照在旅人身上。很快，旅人感到暖和了。因为天气变得宜人，他脱下了外套。太阳赢了。这个寓言的寓意是：温和与善意比暴力和愤怒更有力量。"
  }
]
;
const ARTICLES = [{"id": 1, "title": "Why We Sleep", "title_zh": "我们为什么要睡觉", "level": "beginner", "type": "science", "description": "The science behind sleep and why it matters for your body and brain.", "description_zh": "睡眠背后的科学：为什么它对身体和大脑很重要。", "content": "Every night, all over the world, people close their eyes and go to sleep. But why do we need sleep? Scientists have found several important reasons. First, sleep helps your brain work better. While you sleep, your brain sorts through the information you learned during the day. It keeps important memories and lets go of things that do not matter. This is why students who get enough sleep usually do better on tests. Second, sleep gives your body time to repair itself. Your muscles grow and your cells fix damage while you rest. Third, sleep helps control your feelings. When you do not get enough sleep, you may feel angry or sad more easily. Most adults need between seven and nine hours of sleep each night. Children and young people need even more. If you want to stay healthy, feel happy, and think clearly, going to bed on time is one of the best things you can do.", "translation_zh": "每天晚上，全世界的人们闭上眼睛入睡。但我们为什么需要睡眠？科学家发现了几个重要的原因。首先，睡眠有助于大脑更好地工作。当你睡觉时，大脑会整理白天学到的信息。它保留重要的记忆，丢弃不重要的东西。这就是为什么睡眠充足的学生通常在考试中表现更好。其次，睡眠给身体时间来自我修复。你的肌肉在生长，细胞在你休息时修复损伤。第三，睡眠有助于控制你的情绪。当你睡眠不足时，你可能更容易感到生气或悲伤。大多数成年人每晚需要七到九小时的睡眠。儿童和年轻人需要更多。如果你想保持健康、感到快乐、思维清晰，按时上床睡觉是你能做的最好的事情之一。"}, {"id": 2, "title": "How Rainbows Form", "title_zh": "彩虹是如何形成的", "level": "beginner", "type": "science", "description": "The simple science of light, water drops, and colors in the sky.", "description_zh": "光、水滴和天空中色彩的简单科学。", "content": "Have you ever seen a rainbow after a rain shower and wondered how it gets there? A rainbow is made when sunlight meets water drops in the air. Sunlight looks white, but it is actually made of many different colors. When a ray of light enters a drop of water, it bends and splits into these colors: red, orange, yellow, green, blue, indigo, and violet. You always see red on the outside of the rainbow and violet on the inside. The water drops act like tiny prisms. To see a rainbow, you need two things: sunlight behind you and rain in front of you. That is why rainbows often appear in the morning or late afternoon, when the sun is low in the sky. Sometimes you can see a double rainbow. The second one is fainter and has its colors in the opposite order. Rainbows are not objects you can touch or reach — they are just light playing with water. But knowing the science only makes them more beautiful.", "translation_zh": "你有没有在阵雨后看到彩虹，想知道它是怎么出现的？彩虹是阳光遇到空气中的水滴时形成的。阳光看起来是白色的，但它实际上由许多不同的颜色组成。当一束光线进入水滴时，它会弯曲并分解成这些颜色：红、橙、黄、绿、蓝、靛、紫。你总是看到红色在彩虹的外侧，紫色在内侧。水滴就像微小的棱镜。要看到彩虹，你需要两个条件：阳光在你身后，雨水在你前方。这就是为什么彩虹经常出现在早晨或傍晚，当太阳在天空中较低的时候。有时你可以看到双彩虹。第二条比较淡，颜色顺序相反。彩虹不是你可以触摸或到达的物体——它们只是光与水的嬉戏。但了解科学只会让它们更加美丽。"}, {"id": 3, "title": "The Internet, Simply Explained", "title_zh": "互联网，简单解释", "level": "beginner", "type": "technology", "description": "What the Internet is and how it connects the world, in plain English.", "description_zh": "什么是互联网以及它如何连接世界，用简单的英语解释。", "content": "The Internet is a global network of computers that talk to each other. Imagine a huge spider web that covers the whole planet. Each point on the web is a computer or a phone. When you send a message to a friend, your device breaks the message into small pieces called packets. These packets travel through cables under the ocean, through the air as radio waves, or through fiber-optic lines underground. They may pass through many different countries in just a few seconds. When they reach your friend's device, they are put back together into the original message. All of this happens in less time than it takes to blink your eyes. The Internet lets us share information, watch videos, play games with people far away, and learn almost anything we want. It has changed the way we work, learn, and stay in touch with people we love. But like any powerful tool, it is important to use it wisely — to check if information is true, to be kind to others online, and to take breaks from screens.", "translation_zh": "互联网是一个由相互通信的计算机组成的全球网络。想象一张覆盖整个地球的巨大蜘蛛网。网上的每个点都是一台电脑或一部手机。当你给朋友发消息时，你的设备把消息分解成称为数据包的小块。这些数据包通过海底电缆、空中无线电波或地下的光纤线路传输。它们可能在几秒钟内经过许多不同的国家。当它们到达你朋友的设备时，它们被重新组合成原始消息。这一切发生的时间比你眨一下眼睛还短。互联网让我们分享信息、观看视频、与远方的人玩游戏、学习几乎任何我们想学的东西。它改变了我们工作、学习和与所爱之人保持联系的方式。但像任何强大的工具一样，明智地使用它很重要——核实信息的真实性，在网上善待他人，并适时远离屏幕休息一下。"}, {"id": 4, "title": "At the Doctor's Office", "title_zh": "在诊所看病", "level": "beginner", "type": "dialogue", "description": "A real-life dialogue: making an appointment, describing symptoms, and getting advice.", "description_zh": "真实场景对话：预约、描述症状、获取建议。", "content": "Receptionist: Good morning. How can I help you today?\nPatient: Good morning. I would like to see a doctor, please. I am not feeling well.\nReceptionist: I am sorry to hear that. What seems to be the problem?\nPatient: I have had a bad headache for three days, and I feel very tired all the time. Sometimes I also feel a little sick to my stomach.\nReceptionist: I see. Have you taken your temperature?\nPatient: Yes, I checked it this morning. It was thirty-seven point eight.\nReceptionist: That is a mild fever. Do you have any other problems, like a cough or a sore throat?\nPatient: No cough, but my throat does feel a bit dry.\nReceptionist: Alright. We have an opening at two thirty this afternoon. Can you come in then?\nPatient: Yes, that works for me. Thank you.\nReceptionist: Please bring your health card and arrive ten minutes early. The doctor will ask you about your medical history, so please be ready to answer a few questions.\nPatient: I understand. Thank you very much.\nReceptionist: You are welcome. I hope you feel better soon.", "translation_zh": "前台：早上好。有什么可以帮您的？\n病人：早上好。我想看医生，我感觉不太舒服。\n前台：很抱歉听到这个。是什么问题呢？\n病人：我头疼得厉害，已经三天了，而且一直觉得很累。有时还有点恶心想吐。\n前台：明白了。您量过体温吗？\n病人：是的，今天早上量的。三十七度八。\n前台：那是轻微发烧。您有其他问题吗，比如咳嗽或喉咙痛？\n病人：不咳嗽，但喉咙确实有点干。\n前台：好的。今天下午两点半有一个空位。您能来吗？\n病人：可以，没问题。谢谢。\n前台：请带上您的健康卡，提前十分钟到。医生会询问您的病史，请准备好回答几个问题。\n病人：我明白了。非常感谢。\n前台：不客气。希望您早日康复。"}, {"id": 5, "title": "Ordering at a Restaurant", "title_zh": "在餐厅点餐", "level": "beginner", "type": "dialogue", "description": "From being seated to paying the bill — a complete restaurant conversation.", "description_zh": "从入座到买单——完整的餐厅对话。", "content": "Waiter: Good evening. Welcome to our restaurant. Do you have a reservation?\nCustomer: Yes, I booked a table for two under the name Chen.\nWaiter: Right this way, please. Here is your table by the window. Would you like to start with something to drink?\nCustomer: I will have a glass of water, and my friend would like a cup of hot tea, please.\nWaiter: Of course. Here are your menus. The special today is grilled fish with vegetables and rice. I will be back in a moment to take your order.\n---\nWaiter: Are you ready to order?\nCustomer: Yes. For the starter, we would like to share a bowl of tomato soup. Then for the main course, I will have the grilled chicken with potatoes, and my friend will try the special — the grilled fish.\nWaiter: Excellent choices. Would you like any side dishes? We have a fresh garden salad and steamed green beans.\nCustomer: We will have the salad, please.\nWaiter: Very good. Your food will be ready in about fifteen minutes.\n---\nWaiter: How was everything?\nCustomer: It was delicious, thank you. Could we have the bill, please?\nWaiter: Certainly. Here you are. The total is forty-eight dollars. Will you be paying by card or cash?\nCustomer: Card, please. And please keep the change — the service was wonderful.\nWaiter: Thank you so much. Have a lovely evening!", "translation_zh": "服务员：晚上好。欢迎光临我们餐厅。您有预约吗？\n顾客：是的，我用陈的名字订了两人桌。\n服务员：这边请。这是您靠窗的桌子。要先来点喝的吗？\n顾客：我要一杯水，我朋友想要一杯热茶。\n服务员：当然。这是菜单。今天的特别推荐是烤鱼配蔬菜和米饭。我稍后回来为您点餐。\n---\n服务员：您准备点餐了吗？\n顾客：是的。前菜，我们想分享一碗番茄汤。然后主菜，我要烤鸡配土豆，我朋友想试试特别推荐——烤鱼。\n服务员：很好的选择。要配菜吗？我们有新鲜田园沙拉和清蒸青豆。\n顾客：我们要沙拉吧。\n服务员：非常好。您的菜大约十五分钟后上。\n---\n服务员：一切都好吗？\n顾客：很好吃，谢谢。请给我们账单好吗？\n服务员：当然。给您。总共四十八美元。您刷卡还是付现金？\n顾客：刷卡。不用找了——服务很棒。\n服务员：非常感谢。祝您有个愉快的夜晚！"}, {"id": 6, "title": "How Plants Grow", "title_zh": "植物如何生长", "level": "beginner", "type": "science", "description": "From a tiny seed to a tall tree — the life of a plant explained simply.", "description_zh": "从一颗小种子到一棵大树——植物的生命简单解释。", "content": "Every plant on Earth begins as a small seed. Inside each seed is a tiny living thing waiting for the right conditions to grow. Seeds need three things to wake up: water, warmth, and air. When a seed gets water, it swells and breaks open. A small root grows down into the soil to find more water and food. At the same time, a small shoot grows up toward the light. This is the beginning of a new plant. As the plant grows, it uses its leaves to catch sunlight. Through a process called photosynthesis, the plant turns sunlight, water, and carbon dioxide from the air into food. The green color of leaves comes from a substance that helps this process. Plants also need minerals from the soil, like nitrogen and phosphorus. Without plants, life on Earth would be impossible. They make the oxygen we breathe, they provide food for animals and people, and they help keep our planet cool. Next time you see a tree or a flower, remember: it started as a tiny seed, just like you started as a tiny cell.", "translation_zh": "地球上的每一株植物都始于一颗小小的种子。每颗种子里都有一个微小的生命体，等待着合适的条件开始生长。种子需要三样东西才能醒来：水、温暖和空气。当种子获得水分时，它会膨胀并裂开。一条小根向下长入土壤，寻找更多的水和养分。同时，一根小芽向上生长，朝向光明。这就是新植物的开始。随着植物的生长，它用叶子捕捉阳光。通过一个叫做光合作用的过程，植物将阳光、水和空气中的二氧化碳转化为食物。叶子的绿色来自一种帮助这个过程进行的物质。植物还需要土壤中的矿物质，比如氮和磷。没有植物，地球上的生命将不可能存在。它们制造我们呼吸的氧气，为动物和人类提供食物，并帮助保持地球凉爽。下次你看到一棵树或一朵花时，记住：它始于一颗微小的种子，就像你始于一个微小的细胞。"}, {"id": 7, "title": "Making New Friends", "title_zh": "交新朋友", "level": "beginner", "type": "lifestyle", "description": "Practical tips for meeting people and building friendships, in simple English.", "description_zh": "认识人和建立友谊的实用技巧，简单英语。", "content": "Making new friends can feel hard, especially when you are in a new place or starting a new job. But it is a skill you can learn, just like riding a bike or cooking. The first step is simply to show up. You cannot make friends if you never go anywhere. Join a class, a sports team, or a club that interests you. When you are there, the most important thing is to be open and friendly. Smile, make eye contact, and say hello. Most people are happy when someone else makes the first move. Ask questions and really listen to the answers. People love to talk about themselves, and good listening is a gift you can give to anyone. Do not try to be perfect — just be yourself. Another helpful tip: offer to help. When you see someone who needs a hand, step up. Small acts of kindness build trust very quickly. Finally, be patient. Deep friendships take time to grow. You do not need hundreds of friends. A few good ones who truly care about you are worth more than a thousand who only know your name.", "translation_zh": "交新朋友可能让人觉得很难，尤其是当你在一个新地方或开始一份新工作时。但这是一项你可以学习的技能，就像骑自行车或做饭一样。第一步就是到场。如果你哪儿都不去，你不可能交到朋友。参加一个你感兴趣的课程、运动队或俱乐部。当你在那里时，最重要的事情是保持开放和友好。微笑，进行眼神交流，打招呼。当别人主动时，大多数人都会感到高兴。提出问题并真正倾听回答。人们喜欢谈论自己，而善于倾听是你可以给任何人的礼物。不要试图做到完美——做你自己就好。另一个有用的建议：主动帮忙。当你看到有人需要帮助时，挺身而出。小小的善举能很快建立信任。最后，要有耐心。深厚的友谊需要时间来培养。你不需要几百个朋友。几个真正关心你的好友，胜过一千个只知道你名字的人。"}, {"id": 8, "title": "The Solar System", "title_zh": "太阳系", "level": "beginner", "type": "science", "description": "A tour of our solar system — the Sun, eight planets, and our place in space.", "description_zh": "太阳系之旅——太阳、八大行星和我们在太空中的位置。", "content": "Our solar system is like a big family with the Sun at the center. The Sun is a star — a huge ball of hot gas that gives us light and heat. Without it, there would be no life on Earth. Eight planets travel around the Sun. The four closest to the Sun are small and rocky: Mercury, Venus, Earth, and Mars. Earth is special because it is the only planet we know of that has life. The next four planets are much bigger and made mostly of gas: Jupiter, Saturn, Uranus, and Neptune. Jupiter is so large that more than one thousand Earths could fit inside it. Saturn is famous for its beautiful rings, which are made of ice and rock. Between Mars and Jupiter, there is a belt of asteroids — millions of rocky objects left over from when the solar system was formed. Some planets have moons. Earth has one, but Jupiter has more than ninety. Far beyond Neptune, there are icy worlds like Pluto. The solar system is very old — about four and a half billion years. It is just a tiny part of our galaxy, the Milky Way, which has hundreds of billions of other stars. Looking up at the night sky reminds us how small we are, and how amazing the universe is.", "translation_zh": "我们的太阳系就像一个大家庭，太阳位于中心。太阳是一颗恒星——一个巨大的热气火球，给我们光和热。没有它，地球上就不会有生命。八颗行星围绕太阳运行。离太阳最近的四个行星很小，而且是岩石构成的：水星、金星、地球和火星。地球很特别，因为它是我们所知唯一有生命的行星。接下来的四个行星大得多，主要由气体构成：木星、土星、天王星和海王星。木星非常大，一千多个地球可以装进里面。土星因其美丽的环而闻名，这些环由冰和岩石组成。在火星和木星之间，有一条小行星带——数百万个岩石物体，是太阳系形成时留下的。有些行星有卫星。地球有一个，但木星有九十多个。在海王星之外很远的地方，有像冥王星这样的冰冷世界。太阳系非常古老——大约四十五亿年了。它只是我们银河系的一小部分，银河系有数千亿颗其他恒星。仰望夜空提醒我们自己是多么渺小，宇宙是多么令人惊叹。"}, {"id": 9, "title": "Job Interview Tips", "title_zh": "求职面试技巧", "level": "intermediate", "type": "career", "description": "How to prepare, what to say, and how to make a great impression at your next interview.", "description_zh": "如何准备、说什么、如何在面试中给人留下好印象。", "content": "A job interview is your chance to show a company why they should hire you. Being nervous is normal, but preparation can help you feel calm and confident. Before the interview, learn about the company. Visit their website and read about what they do. Think about why you want this job and how your skills match what they need. Prepare answers to common questions, such as 'Tell me about yourself,' 'What are your strengths and weaknesses?' and 'Why do you want to work here?' Practice your answers out loud, but do not memorize them word for word — you want to sound natural. On the day of the interview, dress neatly and arrive a few minutes early. Bring a copy of your resume and a notebook. During the interview, speak clearly and make eye contact. Listen carefully to each question before you answer. If you do not understand something, it is perfectly fine to ask the interviewer to repeat or explain. At the end, thank them for their time and ask one or two questions about the role or the company. This shows that you are truly interested. After the interview, send a short thank-you email within twenty-four hours. Even if you do not get this job, every interview is good practice for the next one.", "translation_zh": "求职面试是你向公司展示他们为什么应该雇用你的机会。感到紧张是正常的，但准备可以帮助你感到平静和自信。面试前，了解公司。访问他们的网站，了解他们做什么。想想你为什么想要这份工作，以及你的技能如何匹配他们的需求。准备好常见问题的答案，比如'介绍一下你自己'、'你的优点和缺点是什么？'和'你为什么想在这里工作？'大声练习你的答案，但不要逐字背诵——你希望听起来自然。面试当天，穿着整洁，提前几分钟到达。带一份简历和一个笔记本。面试过程中，说话清晰，保持眼神交流。在回答之前仔细听每个问题。如果你不明白某事，完全可以请面试官重复或解释。最后，感谢他们的时间，并问一两个关于职位或公司的问题。这表明你真正感兴趣。面试后，在二十四小时内发送一封简短的感谢邮件。即使你没有得到这份工作，每次面试都是下一次的好练习。"}, {"id": 10, "title": "Why Exercise Matters", "title_zh": "为什么锻炼很重要", "level": "beginner", "type": "health", "description": "The benefits of moving your body, backed by science and common sense.", "description_zh": "科学和常识支持的锻炼身体的益处。", "content": "We all know that exercise is good for us, but do you know why? When you move your body, several wonderful things happen. First, your heart beats faster and pumps more blood around your body. This brings more oxygen to your brain, which helps you think more clearly and feel more awake. Second, your body releases chemicals called endorphins. These are natural mood-boosters that can make you feel happier and less stressed. Third, regular exercise strengthens your muscles and bones. This becomes more important as you get older, because it helps prevent falls and injuries. You do not need to run a marathon or spend hours at the gym. Even a thirty-minute walk every day can make a big difference. The key is to find something you enjoy — dancing, swimming, cycling, or even gardening all count. Try to move your body in some way every single day. It does not have to be hard or painful. Start small, be consistent, and pay attention to how you feel afterward. Your body and mind will thank you.", "translation_zh": "我们都知道锻炼对健康有益，但你知道为什么吗？当你活动身体时，会发生几件奇妙的事情。首先，你的心跳加快，向全身输送更多血液。这给大脑带来更多的氧气，帮助你更清晰地思考，感到更加清醒。其次，你的身体释放一种叫做内啡肽的化学物质。这些是天然的情绪提升剂，可以让你感到更快乐、压力更小。第三，定期锻炼能增强你的肌肉和骨骼。随着年龄增长，这变得更加重要，因为它有助于防止跌倒和受伤。你不需要跑马拉松或在健身房花几个小时。即使每天三十分钟的散步也能带来很大的不同。关键是找到你喜欢的事情——跳舞、游泳、骑自行车，甚至园艺都算。尝试每天以某种方式活动你的身体。不必很辛苦或痛苦。从小处开始，保持一致，并注意你事后的感受。你的身体和头脑会感谢你的。"}, {"id": 11, "title": "Inside the Mind of Anthropic CEO Dario Amodei", "title_zh": "站在AI风暴中心：对话Anthropic CEO达里奥·阿莫迪（完整专访）", "level": "intermediate", "type": "interview", "description": "Bloomberg The Circuit full 69-minute interview with Emily Chang. Covers: AI exponential growth, leaving OpenAI, Mythos superweapon, job losses, civilization collapse probability, AI warfare, Szilard vs Oppenheimer, and why we should trust him.", "description_zh": "彭博社《The Circuit》Emily Chang 69分钟完整专访。涵盖：AI指数增长、离开OpenAI内幕、Mythos超级武器、就业冲击、文明崩溃概率、AI军事应用、西拉德vs奥本海默、以及为什么应该相信他。", "content": "[music]\nHow much are you sleeping?\nYou know, I've never been someone who slept all that well. Let's just say I'm learning the art of finding ways to relax and sleep through moments of unusual pressure.\n\nIt is all moving so fast. How does it feel on the inside?\nIt's this feeling of like the exponential. Suppose you were to accelerate away from earth on a spaceship at relativistic speed. The way special relativity works is you go to sleep and you wake up and two days have gone by on earth, so you have to deal with two days in one day. And then you go to sleep and because you've continued to accelerate, three days have gone by on earth. And then the next day, four days have gone by. That's a little bit what it feels like.\n\nI mean, do you go to bed constantly paranoid about what you'll wake up to?\nThere are enough clear and present issues that we have to deal with that I'm constantly dealing with those while thinking about how we can prepare. But I don't think paranoia or worrying about what you'll wake up to is productive. I've looked at people in history who've dealt with these very high pressure situations. You need to learn to respond rationally and not put dangers out of proportion to each other. This yo-yoing between \"I'm not worried\" and \"oh my god, we need to panic today\" — I think that's a hallmark of immature decision-making. The actual mature decision-making is: you can't ignore this. We can't be complacent. In fact, it's getting to be a bigger and bigger risk. But we have to respond rationally. Like a surgeon would deal with an operation, or a military officer would deal with a military operation. Someone making decisions that affect a lot of people has to make those decisions rationally and they have to understand the risk. But they have to maintain a basic sense of calm.\n\nSo my son yesterday was like, \"Can I use your Claude Co-Work account?\" And I was like, \"Absolutely not. I need my tokens.\" [laughter]\n\nWe're seeing more and more of them even in the consumer space. We wanted to be more of an enterprise company, but even consumer, without us putting that much effort, is starting to grow fast.\n\nYou are at the center of the AI universe right now. What does that feel like?\nThe interesting thing is that the experience I've had for my whole career, and certainly the whole time at Anthropic, is that there's this kind of smooth exponential. And the experience of the smooth exponential is: nothing's happening, nothing's happening, nothing's happening. A little things happen, and then zoom — it goes crazy. That's the experience of the world. That's the experience of the scale of the company compared to the other companies and compared to the world. I was watching this graph for a while and I said, \"Oh yeah, we'll probably become the AI company with the most revenue and the most valuation sometime around this time.\" And indeed it has happened. In one sense, I'm not surprised because this is just a smooth line on the graph, but of course, when things actually happen, you see so much more detail and color to it. We're just keeping in mind all the things we usually keep in mind: how do we train good models? How do we put them in good products? How do we make sure that everything's safe? How do we help people but also manage the societal risks around the technology? It's all the same questions, just under a bigger microscope.\n\nWhat were you like as a kid growing up in San Francisco? I know your dad was a leather craftsman, your mom worked in libraries. How did that shape you?\nThe whole first internet revolution was happening around me and I had absolutely no interest in it. I was just interested in doing math and understanding the universe. I was interested in science fiction. I think I just felt a lot of curiosity about the world.\n\nYou grew up in the town that is the center of technology and right now it's the center of AI. Is there anything about this place that informed your worldview?\nI think the general spirit of nonconformism and individualism — and \"it's okay to be crazy\" — a good deal of that probably did rub off on me. You hear these stories about countries in Europe or even other parts of this country where it's just discouraged or considered weird to think about things in some different way. There's a lot of things I'm actually very critical about with Silicon Valley. But one thing that I think is good about it is this encouragement: it doesn't matter if all the experts are against you. If you have a coherent vision and a coherent worldview, you should go and pursue it. Maybe it just won't work at all. But if it does, there's this kind of long-tailedness to it — there are certain places you can search certain veins where you might find a huge gold mine. I think that spirit is very important.\n\nYou, Daniela, your sister, and her husband Holden Karnofsky lived in a group house together back in 2016. What were you debating back then?\nThat was the time when Open Philanthropy Project was first being started up, which Holden was the lead of. I was at that time a biological scientist. I was helping them with some of the stuff they were doing around developing world health or biological research. I advised on what were the areas that were promising and what were the areas that were less promising.\n\nYour decision to leave OpenAI has become Silicon Valley lore. What really happened? Beyond the narrative, what were the issues? What did you disagree on?\nLook, I'm going to say it very simply. There are many difficult issues that you face when you're building powerful technology — that Anthropic faces every day — where we don't know whether we're making the right decision or the wrong decision. There are many valid disagreements to be had on safety. We certainly had some of those disagreements with them. But that alone is not sufficient to leave. People here have had disagreements with me. People here have disagreements with each other.\n\nBut when you feel that you can't trust someone, when you feel that their values are not what they say they are, when you feel that they're not honest, when you feel that they're not in it for the reasons that they say, when you see disturbing patterns of behavior, dishonesty — that makes it very hard to continue to work with a company, to continue to trust the company.\n\nAnd look, at the end of the day, why argue with someone when you don't have the same vision and you don't trust them? The way to resolve it is you go off and do your thing, they go off and do their thing. I am completely at peace with the idea that we're doing things our way and they're doing things their way. We'll see who wins in the market and we'll see who wins in the court of public opinion. Those things speak louder than any drama about who left what. We're providing an example of how to deploy this technology in what we think is a responsible way. If they disagree, they should make that argument. That's really all there is to say about it.\n\nThere was a moment at India's AI summit where you and Sam Altman appeared to refuse to hold hands on stage. What happened there?\nWhat happened is that the summit was extremely disorganized. We all came up at the last minute and then they changed the order in which we were standing, and then they took a picture of us, and then they ordered us all to hold hands. If you've ever been to one of these summits — I'm not saying anything bad about India in particular — but all of these kind of international type summits that have heads of state are super disorganized.\n\nOkay. But everyone else held hands. Come on.\nLook, I don't know what to tell you. There was Narendra Modi up there suddenly telling everyone to hold hands. [laughter]\n\nAll right. Look, Sam and Elon are suing each other. You don't like Sam? If the people building the most important technology in the world can't hold hands on stage, how can we trust you'll cooperate on existential risk?\nHere's what I will tell you. There is a wide variance in the quality and the trustworthiness of the people building this technology. I think this meme that no one trusts each other — I don't think it's right. I've known Demis Hassabis, who builds the Gemini models that are a competitor to Claude models — I've known him for 15 years. We've worked together on a number of issues. We buy compute from Google. We swap safety ideas all the time.\n\nMy view of this is that there are some players who are more trustworthy than others. There are players outside Anthropic who I trust, who I see as trustworthy. What I think needs to happen is that the trustworthy actors need to get together and put the untrustworthy actors in a position where they kind of have to adopt the same standards.\n\nThere's the positive version of it where you inspire other people. That's like Demis and me inspiring each other. He does AlphaFold, we're trying to do something in bio as well. We do interpretability research, they start interpretability research. It's not even competition — it's just each company does something cool and the other company's like \"that's cool, we'd like to do that too.\" That's the carrot side of the race to the top.\n\nThen there's the stick side where you're like, okay, these guys are doing the right thing. Those guys will look bad if they don't do the right thing. Often we see behaviors where they kind of grudgingly do the right thing while trying to pretend they're doing something different and there's something bad or sinister about us. That is to be expected. But I think that's the way we get the industry together and that's the way we get the industry to cooperate.\n\nNow, early on others focused on fun, splashy consumer apps. You made a bet on coding and enterprise, and Claude Code is a hit. Claude Co-Work is a hit. Why did you make that bet? Was it a values decision or a business decision?\nWhen we started Anthropic, the base thing that mattered — the thing that always matters — is we want to do this right. But then you have to ask yourself: in order to fund the very expensive creation of these models, it needs to be a company that needs to have a business model. Does the business model get in the way of the values?\n\nIf you pick a business model that fundamentally conflicts with your values, you're going to have a hard time. Either you betray your own values or you become irrelevant. It's far better to pick a business model that is compatible with your values.\n\nWhen we thought about it, we said, look, we've seen the world of social media, the consumer world — it really seems to encourage engagement, even addiction. The slop we've seen with AI video models — it's about maximizing the number of minutes that you're paying attention, because that's the advertising revenue-driven incentive.\n\nWhereas if we look at enterprise — we want to make these models useful to people. If I think of all the positive things you can do with AI — I warn a lot about the negative things, but ultimately we think the positive things will outweigh the negative things — many of those basically fall under the banner of enterprise. We want to use AI to cure diseases that we couldn't cure before — that's working with biotech, pharma, academic research groups. All of those are enterprises. We want to use AI to make energy cheaper and more efficient — that's all enterprise. We want to use AI to help with education — most of that is enterprise. We want to use AI to address health in the developing world — they're nonprofits, but those are basically enterprises. We want to increase economic growth — that is basically enterprise as well.\n\nAnd then there's another factor: enterprises care a lot about trust and long-term relationships. Consumer can have this almost gimmicky aspect to it. With enterprise, what matters is you build a relationship where you work with a company for many years. You deliver on what you say, they deliver on what they say, and they basically trust you. It's very synergistic with our goal of deploying these models in a positive and safe way. It serves us well to have this business model that largely aligns with our values. Not that there aren't conflicts sometimes, not that there aren't hard choices we have to make, but the number of such choices is much lower than it would be otherwise.\n\nA developer can switch from Claude to GPT or Gemini in an afternoon. Is it really possible to have a long-term lead in this industry? How long would it take a serious competitor to replicate what you've done?\nModel quality is the most important thing. We're very far ahead right now on model quality. There is some amount of inertia, but I've never relied on that. Anthropic has never relied on \"oh, this is sticky and people won't switch.\" You want to have a better model. You want to have a better product. We see the growth rates haven't inflected at all. If anything, they've gone up.\n\nSoon after Claude Co-Work was released, $285 billion in market value vanished overnight. Traders called it the \"SaaS Apocalypse.\" If AI continues improving at this pace, how much of traditional software gets replaced and how fast?\nThis is one of these questions that's very hard to predict in advance. If you could predict it perfectly, people would make a huge amount of money on the market and they'd always be right. No one knows exactly what's going to happen.\n\nBut I would note a few things. All of these traditional software companies have a number of moats. I think some of these moats are going to go away, but others are going to stay around. The ability to quickly write software — I definitely think that's going away. If your moat is \"we wrote this complex software that no one else can write\" — good luck. You're not going to be able to defend that.\n\nBut folks have customer relationships. Folks have knowhow of how the field works. Folks have unique domain knowledge. My advice to all of these folks is: don't be complacent. Don't ignore it. Make a list of all your moats and be very aware that some of them are going to go away, while others are going to become relatively more important because they're the limiting factors. There may also be new moats.\n\nI think those that deftly respond — that lean into the list of moats that are still present as well as the new ones — will do well. Those that are complacent, that delude themselves that what worked in the past will continue to work — they're not going to have a good time.\n\nAt the end of the day, I would guess that the software industry gets larger, not smaller — although there will be some big losers.\n\nExplain that.\nI just think the pie is getting bigger. With AI, the pie is getting bigger. The existing incumbents may be smaller in relative terms. Some of them may go down in value. Some of them may even go out of business if they don't adapt in the right way. But you see this often when growth is really fast — if what's possible with AI grows by 10x, it's very easy for an existing incumbent industry to go up by 1.5x. Not as much as the whole pie is growing. But I think those who don't adapt, who put their heads in the sand, who don't see what's coming — they're going to have a really hard time.\n\nYour biggest backers are companies like Amazon, Google, Microsoft, and Nvidia. These are companies that all have their own agendas. They are partners and rivals. You have huge commercial milestones tied to funding. Who's really calling the shots?\nThere have been a number of cases where we've really spoken our minds about what we think. I've been very outspoken about the need for export controls on chips to China. I say this because I think it would be really bad for America, for the state of democracy in the world, for China to be ahead in AI capabilities. Some of the chip makers obviously don't agree with that view, but it hasn't stopped me from saying it. What they know is that we always work with them. We've been good partners. We can work together. I'm sure they wish we didn't say these things, but these things are what I believe. At the end of the day, they benefit from these deals as much as we do. We're all adults here. We can work together on one thing while disagreeing about another thing.\n\nBloomberg's reported that you're at valuations that are higher than OpenAI. We're talking nearly a trillion dollars for a 5-year-old startup. How do you make sense of that number? And why do you need that much money if you're more disciplined on compute and have a faster path to profit?\nThe compute is ramping up very quickly. It can both be the case that the fundamentals of the business look good, but in a year you'll have three or four times as much compute. These compute ramps are very fast, and we have every expectation that the revenue ramp will meet and exceed those. But raising money is kind of the buffer against this cone of uncertainty. It's a totally rational thing to do. It's a very small dilution to the business. It's compatible with the opposite of there being anything wrong with the fundamentals of the business.\n\nThere have been reports of server strain, reliability issues, people complaining about running out of tokens. You've said other companies are \"YOLOing\" on infrastructure. Do you actually have what you need or are you playing catch-up?\nOne of these things about compute is there's a market in compute. My view is that over a period of time, we can get large amounts of compute. I don't think we bought too little compute by any reasonable standard. We were planning for a 10x a year growth in compute. 10x a year is what we expect. That isn't what we've seen over the first quarter of 2026. We saw a greater than 3x growth in revenue quarterly — not annualized, 3x in the quarter. Three to the fourth power is 80x over the course of the year. We didn't plan for 80x annualized growth. It would not have been rational to plan for 80x annualized growth, because that means if you only get 10x, you have eight times less.\n\nWe're in a locally extreme explosion of compute. That's not going to continue. If that continued, you just get to revenue numbers that no company on Earth — I don't think that's going to happen. But you can have these short periods where it's like, \"oh my god, this is faster growth than we ever possibly anticipated.\" You saw the compute deals with Google, you saw the compute deals with Amazon. There are more that we can and will do. The market's liquid. If you're able to use compute really well and there's the demand, you'll get your compute. It might just take a month or two.\n\nDoes it feel good to surpass your arch rival?\nLook, we have a lot of difficult challenges in front of us. There's this \"race to the top\" idea that we're trying to pull other companies along with us. We've seen that we have pulled them along with us. Sometimes they don't admit that's what they're doing. Sometimes they copy us while they're attacking us. But this pull is very valuable. The value of being the preeminent company both commercially and in terms of models — it's not about beating rivals for the sake of beating rivals. It's about having the ability to pull the ecosystem along with us.\n\nBut winning has to feel just a little bit good.\nLook, we're always trying to succeed. We're not trying to fail here. I'm not someone who believes we should shut this technology down. We exist within a free enterprise system. There's nothing wrong with this. We just have to mitigate the risks of the models. It's always been the balance between the two.\n\nFor most of Anthropic's history, you were the underdog. I imagine it's easier to take the moral high ground when you have nothing to lose. At this scale, how hard is it to stay true to your values?\nI've put a lot of time into thinking about how that's the case. As companies scale, I've been paranoid at every scale. At every scale of the company, there's some new challenge — some new way the company can lose either its will to win commercially or the core of its values. I'm worried about both because I see them as synergistic. I actually see the fact that we've been able to make such good models as the thing that allows us to assert our values in a way that works as the company grows.\n\nThere are lots of pitfalls here. Not because my or the co-founders' values change, but because the composition of the company changes very fast. I spend probably half of my time just talking to the company about the culture of Anthropic and how the culture works. When you're growing this fast, you're hiring a bunch of people from big tech companies. If you don't tell them how Anthropic operates, they'll simply recapitulate the only thing they know, which is how to operate at the companies that they came from. This is a constant struggle. Me and Daniela's number one top priority is figuring out how to preserve this, because we recognize that this is the core of who we are in the long run.\n\nYour product velocity is insane. You're shipping so much so fast. How are you doing it?\nTwo things. First, we have a unified company, a unified culture. We've grown larger while still being incredibly efficient, everyone's still on the same page. The cultural and organizational unity — that's the biggest factor. Second, Claude itself. We're now using Claude to help develop our models and make them more efficient and quickly develop products. It's producing a lot of acceleration, increasingly reliable acceleration.\n\nWill you tell me the most wild thing you've seen AI do?\nSome of the wildest stuff I've seen is around biology and medicine. I've seen a number of cases, including Daniela actually, where Claude diagnosed a medical problem that a bunch of fancy doctors had missed. On the biology side, the models are starting to get surprisingly good at tasks like drug design or computational chemistry. As someone who used to be a biologist, I look at it and I'm like, \"Wow, that's hard. You need a lot of training to do that.\" And Claude is getting good at it. That's one area where we're going to get a hell of a lot of benefit. That's the positive for AI — we're going to get these huge enormous benefits. Life is going to get better. The quality of human experience is going to get better.\n\nA century of scientific progress. A century of progress in what it's like to be human. Go back to 1900. Think of all the problems we had in the 1900s, all the reasons people died prematurely, all the material deprivation that we don't have to deal with today. Then think of another hundred years of that. I really believe this century of scientific and medical progress — if we can get through this, and I think we will, I'm increasingly optimistic — we're going to have a much, much better world.\n\nI know how much you love writing. You're known for your essays. Do you use Claude to help write?\nI do. I have not gotten to the point where I actually allow text directly written by Claude in, because I have such a specific style that I'm a little picky about it. But I use Claude to help me brainstorm, to help me think through the themes, to help me with references. It plays a supportive role. I don't know how far we are from Claude being able to write better than me. We're not quite there yet, but certainly it's coming.\n\nI love writing too. Writing helps you struggle through ideas. There is a lot of critical thinking involved. Do we lose that if we let Claude do it for us?\nI'm a little worried about that. That's half the reason I write myself. It certainly is for external audiences — many people read what I write — but it is just as much to clarify my own thinking so that I know what to do next and to create a common reference point across me and others. I think we're still grappling with how exactly to use AI in a way that preserves those benefits. The thing I'm doing now does that — using Claude for research, helping organize my own thoughts. If we just used it end-to-end — \"write an essay about the risks of AI\" — first of all, it wouldn't write the things that I think, but also I would exactly lose that benefit. As the models get better, there's probably some way to use them much more directly in the writing and yet still preserve those benefits. It's going to be subtle. We'll have to figure it out over time.\n\nI think we could have this very unusual combination of very fast GDP growth and high unemployment — or at least underemployment, a lot of low-wage jobs, high inequality.\n\nYou've been really direct about job loss. AI could eliminate half of all entry-level white collar jobs in the next 1 to 5 years. That was a year ago. AI has moved incredibly fast. Is it still 50% or is it higher?\nI've always said — and if you go back to those original clips, they always get cut out of context in the 3 seconds — the real statement was always: I don't know what's going to happen, but this is an order of magnitude for how crazy things could be. Also, I always talk about all the things we can do in response. I've talked about token tax and working with enterprises to adjust people. Macroeconomic policy. Even from the beginning, I always talked about solutions.\n\nBut somehow there's this tendency in human psychology to clip the 3 seconds of \"doom is coming.\" My message is definitely not \"doom is coming.\" My message is: this is something we should see coming, that we're worried about, and that we need to actually respond to positively.\n\nI don't know exactly, but I'm still pretty concerned. I'm still the same order of concern. We are seeing right now that AI is making people more productive. But that's the usual hump. If you go back to the Industrial Revolution — I wrote about this in \"Adolescence of Technology\" — you automate 90% of the job. Great, people are 10 times more productive in the other 10% because they're 10 times more leveraged. But eventually it gets close to 100%. Then you have to find something else for them to do.\n\nI don't know about the long run. I'm truly uncertain about that. But I do think there are types of adaptation. Software engineers within Anthropic — we're going through this transition right now. Right now AI makes the software engineers more productive even though AI writes all the code or almost all the code. But we're already starting to see the beginning of — there may be some people that it's not making more productive, that it's better for the AI to just do the thing.\n\nOn the other side, what do we need more demand for? There's something we call a \"forward deployed engineer\" or \"applied AI solutions architect\" — their job is a mix of technical work and talking to customers. There's a lot of demand for that because there's a lot of customers and we're growing very quickly. Does every person who is in the pure software engineering role fit that? No. It's not perfect, it's not one to one. But that gives you a flavor — there's going to be a hell of a lot of disruption, but things will also adjust. Which wins out, I don't know.\n\nBut the reason it's important to warn about it is that that's how we can respond. That's how we can make policy — both within Anthropic and macroeconomically for the whole world. We want to put out carefully considered thoughts. We don't want to say things that are half-baked. We want to think carefully about what should actually be done about these problems.\n\nYou put out this chart showing potential job disruption — sales, finance. Which jobs go away, who gets replaced, and what new jobs are created.\nNo one knows for sure, because the economy is unpredictable — the same as the stock market. You don't really know ahead of time what are the pieces of the job that people are still going to be able to do. But broadly, anywhere that you have entry-level white collar — whether it's banking, whether it's finance — there's going to be a lot of potential for AI to first make people more productive, but then there's going to be wholesale \"AI can do the job,\" and then we're going to have to think about what it is that people can do. We need to plan about that ahead of time.\n\nWe're already doing it when we talk to enterprise customers. They face the choice of: should I save cost, which often means hiring less people — basically do the same thing with less resources — or should we do more things with the same amount of resources? We always, when we can, try to push them to doing more with the same amount of resources, because that means hire the same number of people or maybe even more people, but just do new things. Pushing them towards the positive sum.\n\nThe thing that we have going for us here is the pie is going to expand a lot. Because the pie is going to expand a lot, there are probably going to be places where people can go. It's just a matter of finding them fast enough. It's the size of the disruption — it's going to be big, and that's what I'm warning people about. We have to solve that matching problem.\n\nSo play this out for me. You wake up in 5 years. What does this country look like? What are those people doing? Because if there's that much unemployment, is that not how revolutions start?\nThis is the outcome we want to prevent. This is absolutely the outcome we want to prevent. There's a few places. None of them are guaranteed.\n\nThere's the physical world. Things that are in the physical world. Yes, there's a robotics revolution as well, but it's a lot slower than what's happening in AI. People always talk about building data centers, but when processing information of any type becomes a lot easier, maybe the restriction is going to be things in the physical world. We need a lot more people to make, build, manufacture things in the physical world.\n\nAnything that's human-centered — I think that's going to be a big deal. I hear all these stories about \"AI found something that my doctor couldn't find,\" but people really want to talk to other humans, particularly over important things. Maybe AI can do better customer service, but nevertheless, people — or at least some people — want to talk to humans. These kind of human relationship-driven jobs are going to be important.\n\nAnd I think there will be some effort by the humans to direct the AIs. At some level it has to be in line with someone's values and someone's intentions. There's going to be some role there, although I don't know how thin versus how thick it will be. It's very hard to say.\n\nThere has been a lot of pushback. Jensen Huang said you're conflating tasks with jobs. Other folks have said this is sort of \"doom marketing\" that benefits Anthropic.\nI want to be really clear and push back hard against this. The whole picture is: there are risks to job loss, and here are some ideas. We haven't fully fleshed out the ideas because I want to get them right. But Anthropic has come up with lots of ideas. We've had economic grants. We have the Economic Index. I talk about the possible ways to address these risks — from tax and macroeconomic policy to what the new jobs are. In \"Adolescence of Technology,\" I have like five pages where I lay out the difference between tasks and jobs, why this time is different than other times, a list of six different things we can do from private philanthropy to government action. I talk about the problems. I talk about the solutions.\n\nBut social media — which I detest as a category — people have these 3-second clips from a year ago. They don't actually read the essays. The idea that this is \"cheap marketing\" is itself cheap marketing. This is laziness. This is failure to engage with serious intellectual work. It's part of the disease of Silicon Valley. It's been caught up in this social media world of 3 seconds, and so people only respond to it. It's very dangerous, and we've failed to have a mature conversation. Instead, people just lazily see this 3-second clip and they're like, \"Oh, this is what Dario was saying.\" It's so stupid. It's so unserious. Whenever someone says something like that, I take them less seriously.\n\nOne of the leading AI companies in the world is deeply embedded in many different aspects of US national security. The standoff between Anthropic and the Pentagon over AI military safeguards is ramping up.\n\nYou've had a long-standing anti-war stance dating all the way back to your days at Caltech. And yet, you were one of the first AI companies to sign a contract with the Department of Defense to operate on classified networks that the US uses to fight wars. Explain that.\nThe world changes. When I see Russia invading Ukraine, when I see the risk of China invading Taiwan, it worries me that we have a kind of resurgent authoritarian bloc that is very aggressive and that we need to defend ourselves. That is something that I have believed for a while now and continue to believe. That's why across both administrations — I may not agree with every policy of either administration, but that's why we've generally been supportive of this.\n\nWe don't want a world where China and Russia can analyze all the intelligence with AI, can use AI for attacking Taiwan and Ukraine, and we can't defend them. That's why we worked with them. We certainly don't do it for the money. It's a huge pain — even putting aside the lawfare, it's just a huge pain to get up on government networks for not that much money. We did it because we cared about it.\n\nBut similarly, because we're doing it because we cared about it, there need to be limitations on the use of the technology. The formulation that I used in \"Adolescence of Technology\": we should use this technology in every way except the ways that undermine our own values. Our red lines of mass surveillance and fully autonomous weapons — those are things that I believe undermine our values. It's not worth democracies winning if democracies do those things. That's the balance that I see, and that's the stand that we took. It explains both why we were the first to work with the Department of Defense and why there were some things we wouldn't do when others were willing to do those things.\n\nYou need to pick a stand and stand your ground. I don't get this idea of companies that seesaw from \"we won't do anything with the government\" to suddenly \"we're doing absolutely everything with the government.\" You should pick your principles and stick with them.\n\nYou've been working with Palantir since 2024. Their technology is used by ICE, police departments, in Gaza. Is Claude being used for surveillance in other ways?\nWe don't work with ICE — either through Palantir or anyone else. We don't work with CBP. I don't believe we work in Gaza. We're very careful about scoping our engagements to things that we believe in.\n\nThe president banned you from the federal government. The Pentagon labeled you a supply chain risk. OpenAI jumped in and signed the contract that you wouldn't. What does winning this fight actually look like?\nI don't think there's any winning this fight for a private company. This isn't a fight Anthropic is trying to win. This is more a debate about what the proper use of AI by the government is. AI is an emerging new technology. We don't understand the ways in which it's reliable or unreliable. We don't understand the ways in which it promotes our values or undermines our values. One of the things that I thought was important was to establish a precedent on some of the use cases we think are good — which frankly is most of them — and some of the use cases that we're concerned about.\n\nYou can only do so much with a contract. Someone else can sign a contract that doesn't respect your same red lines. But what it has done is raised awareness for the issue. We have serious bipartisan efforts in Congress attempting to ban some of the things we're concerned about and attempting to set guardrails. That's kind of winning — the effort to get our country to think more carefully about what is appropriate use of this technology.\n\nDo you mind being called an ideological lunatic or a bunch of left-wing nut jobs?\nI've been called worse things than that all the time. People can call me or Anthropic whatever they want. The two things that matter are: we're successful as a company, and we stand up for our values. In some ways, my life is really easy because when those are the two things you're trying to do, it's really simple. You always know where you stand.\n\nA US official has said with the help of LLMs, the US military has gone from being able to hit a thousand targets a day to 5,000 targets a day. That means Claude can help kill more people more quickly. Are you comfortable with that?\nThere's two things here. There is the ability of the United States to be more effective militarily. I am supportive of that ability. I think having that ability be stronger doesn't cause wars — it deters wars. Do you believe in this country? Do you want this country to be a more powerful actor rather than a less powerful actor on the world stage? I do. I'm a patriot.\n\nThere's a separate question: are there particular policies that the US government is engaged in that I might support or not support? Obviously I support some and don't support others. It's not up to me — if we provide a technology, it's not up to us to say you can do this military operation and you can't do that military operation. You have to leave policy in the hands of the military decision makers. What you can do is assert some high-level boundaries that prevent the use cases that seem inconsistent with our values and promote the use cases that encourage our values.\n\nBloomberg has reported that Claude is being used by the US military in the war in Iran to do AI-assisted targeting via a platform made by Palantir, Maven Smart System. In February, a US missile reportedly hit a girls' school in Iran, killing more than 150 people, most of them children. Did Claude play a role in that strike?\nWe don't have access to — we don't know exactly how these models were used. These mistakes that happen in warfare are really, really terrible. If that doesn't make clear why we have to stand up for use cases that we don't support... We were willing to risk the future of our company to limit how these models are used. What you're talking about is a use case that doesn't even violate our red lines. We're worried that there will be a hundred times as much with use cases that do violate our red lines.\n\nOverall, the use of these models is appropriate. I think it's good on net. But military decision makers make terrible mistakes even at the best of times.\n\nWhat we've seen here is Claude assists, but a human makes the final call. A human made that final call, not Claude. Imagine if you had a world in which — not Claude, because we haven't allowed it — but someone else's AI model, the AI model just makes the decision and the human never sees it. That's what we were standing up for. That's what we were fighting against.\n\nThis school had a website —
